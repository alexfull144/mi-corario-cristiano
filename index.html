<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Corario AI - Ministerio Musical</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&display=swap');
        
        :root { --indigo-primary: #6366f1; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            margin: 0; 
            min-height: 100vh; 
        }

        .notranslate { translate: no !important; }

        /* Estilo Botones 3D */
        .btn-3d {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #3730a3;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3730a3;
        }
        
        .btn-3d-secondary { box-shadow: 0 5px 0 #94a3b8; }
        .btn-3d-secondary:active { box-shadow: 0 1px 0 #94a3b8; }

        /* Renderizado de Acordes */
        .chord-line { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.2rem; min-height: 2.8em; }
        .chord-seg { display: inline-flex; flex-direction: column; vertical-align: bottom; margin-right: 2px; }
        .chord-top { height: 1.4em; font-weight: 800; color: #6366f1; line-height: 1; white-space: nowrap; margin-bottom: 2px; user-select: none; font-family: 'JetBrains Mono', monospace; }
        .text-bottom { line-height: 1.2; white-space: pre; }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }

        /* Forzar modo oscuro */
        .dark body { background-color: #020617 !important; color: #f8fafc !important; }
        .dark .bg-white { background-color: #0f172a !important; }
        .dark .text-slate-900 { color: #f1f5f9 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.FB = { auth, db, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, signInAnonymously, onAuthStateChanged, googleProvider, signInWithPopup, signOut };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
          const fb = window.FB;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [loading, setLoading] = useState(true);
          
          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          const [activeSongId, setActiveSongId] = useState(null);
          const [activePlaylistId, setActivePlaylistId] = useState(null);
          const [transposeSteps, setTransposeSteps] = useState(0);
          const [textSize, setTextSize] = useState(18);
          const [isScrolling, setIsScrolling] = useState(false);
          const [scrollSpeed, setScrollSpeed] = useState(2);
          const [bpm, setBpm] = useState(120);
          const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
          
          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editLyrics, setEditLyrics] = useState('');
          const [editKey, setEditKey] = useState('');

          const [searchQuery, setSearchQuery] = useState('');
          const [toast, setToast] = useState(null);
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [aiDevotional, setAiDevotional] = useState(null);
          const [showStylePanel, setShowStylePanel] = useState(false);
          const [chordColor, setChordColor] = useState('default');
          const [lyricColor, setLyricColor] = useState('default');

          const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
          const [newPlaylistName, setNewPlaylistName] = useState('');
          const [showAddSongModal, setShowAddSongModal] = useState(false);
          const [playlistMode, setPlaylistMode] = useState('list');

          const audioCtx = useRef(null);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          useEffect(() => {
            const unsub = fb.onAuthStateChanged(fb.auth, (u) => {
              if (!u) fb.signInAnonymously(fb.auth);
              else setUser(u);
              setLoading(false);
            });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!user) return;
            const appId = "corario-pro-v32";
            const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), (snap) => {
              setSongs(snap.docs.map(d => ({id: d.id, ...d.data()})));
            });
            const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists'), (snap) => {
              setPlaylists(snap.docs.map(d => ({id: d.id, ...d.data()})));
            });
            return () => { unsubS(); unsubP(); };
          }, [user]);

          // --- IA GEMINI ---
          const handleIA = async (mode) => {
            const apiKey = "AIzaSyB8eQAgc68ME2eS0pq5WW1fEVwZ3shKaUQ";
            setIsAiLoading(true);
            const prompt = mode === 'reharmonize' 
                ? `Actúa como músico profesional. Rearmoniza la canción con acordes de jazz y piano gospel enriquecidos entre corchetes [Acorde]. Cifrado Americano. Solo devuelve el texto rearmonizado. Letra:\n${editLyrics}`
                : `Genera un devocional cristiano breve con un versículo clave para la alabanza "${songs.find(s=>s.id===activeSongId)?.title}".`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Responde solo texto puro sin markdown ni saludos." }] }
                    })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
                if (text) {
                    if (mode === 'reharmonize') setEditLyrics(text);
                    else setAiDevotional(text);
                    showToast("¡IA completada!");
                }
            } catch (e) { showToast("Error de conexión IA", "error"); }
            setIsAiLoading(false);
          };

          const transposeChord = (chord, steps) => {
            if (!chord || steps === 0) return chord;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
            return chord.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                let n = m.toUpperCase();
                if (mapEs[n]) n = mapEs[n];
                let idx = notes.indexOf(n.replace('B', '#'));
                if (idx === -1) idx = notes.indexOf(n);
                if (idx === -1) return m;
                let newIdx = (idx + steps) % 12;
                if (newIdx < 0) newIdx += 12;
                return notes[newIdx];
            });
          };

          const renderLyrics = (text) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <div key={i} className="h-4"></div>;
                const parts = line.split(/(\[[^\]]+\])/g);
                let segments = [];
                let lastChord = "";
                parts.forEach(p => {
                    if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                    else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                });
                if (lastChord) segments.push({ chord: lastChord, text: "" });
                return (
                    <div key={i} className="chord-line notranslate" translate="no">
                        {segments.map((seg, j) => (
                            <div key={j} className="chord-seg notranslate">
                                <span className="chord-top notranslate" style={{ fontSize: `${textSize*0.75}px` }}>
                                    {seg.chord ? transposeChord(seg.chord, transposeSteps) : '\u00A0'}
                                </span>
                                <span className="text-bottom notranslate" style={{ fontSize: `${textSize}px` }}>
                                    {seg.text || (seg.chord ? '\u00A0' : '')}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            });
          };

          // --- VINCULAR ACORDES (LOGICA MAESTRA) ---
          const linkChordsManually = () => {
            if (!editLyrics) return;
            const lines = editLyrics.split('\n');
            let result = [];
            const isChord = (w) => /^[A-G][#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i.test(w) || /^(Do|Re|Mi|Fa|Sol|La|Si)[#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i.test(w);
            
            for (let i = 0; i < lines.length; i++) {
                const current = lines[i];
                const next = lines[i+1];
                const words = current.trim().split(/\s+/);
                const isChordLine = words.length > 0 && words.every(w => isChord(w));

                if (isChordLine && next && !next.trim().split(/\s+/).every(w => isChord(w))) {
                    let merged = next.split('');
                    let offset = 0;
                    const regex = /([^\s]+)/g;
                    let match;
                    while ((match = regex.exec(current)) !== null) {
                        const tag = `[${match[0]}]`;
                        const pos = Math.min(match.index + offset, merged.length);
                        merged.splice(pos, 0, tag);
                        offset += tag.length;
                    }
                    result.push(merged.join(''));
                    i++; 
                } else {
                    result.push(current);
                }
            }
            setEditLyrics(result.join('\n'));
            showToast("¡Acordes vinculados!");
          };

          const handleSave = async () => {
            if (!editTitle.trim()) return showToast("Falta el título", "error");
            try {
                const data = { title: editTitle, artist: editArtist, lyrics: editLyrics, musicalKey: editKey, updated: Date.now() };
                const appId = "corario-pro-v32";
                if (activeSongId) await fb.updateDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'songs', activeSongId), data);
                else await fb.addDoc(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), data);
                setCurrentView('list');
                showToast("¡Guardada!");
            } catch (e) { showToast("Error al guardar", "error"); }
          };

          const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

          const activeSong = songs.find(s => s.id === activeSongId);
          const activePlaylist = playlists.find(p => p.id === activePlaylistId);

          if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black animate-pulse italic">CORARIO AI...</div>;

          return (
            <div className="min-h-screen">
              {toast && <div className={`fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl font-bold shadow-2xl z-[500] animate-bounce ${toast.type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white`}>{toast.message}</div>}

              {/* HEADER SEPARADO */}
              <header className="sticky top-0 z-50 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-xl">
                <div className="max-w-5xl mx-auto flex flex-row justify-between items-center w-full">
                    <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => {setCurrentView('list'); setIsScrolling(false);}}>
                        <Icon name="music" size={30} className="text-white" />
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter hidden sm:block">Corario AI</h1>
                    </div>
                    <div className="flex items-center gap-3">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-12 h-12 flex items-center justify-center bg-white/10 dark:bg-slate-800 rounded-2xl btn-3d btn-3d-secondary">
                            <Icon name={isDarkMode ? "sun" : "moon"} size={22} />
                        </button>
                        {user?.isAnonymous === false ? (
                            <button onClick={() => fb.signOut(fb.auth)} className="w-12 h-12 rounded-2xl border-2 border-white/20 overflow-hidden shadow-lg bg-indigo-500">
                                {user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover" /> : <Icon name="user" size={20}/>}
                            </button>
                        ) : (
                            <button onClick={async () => { try { await fb.signInWithPopup(fb.auth, fb.googleProvider); showToast("¡Iniciado!"); } catch(e) { showToast("Error", "error"); } }} className="btn-3d bg-white text-indigo-700 px-5 py-3 rounded-2xl font-black text-xs">
                                ENTRAR
                            </button>
                        )}
                    </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto p-4 md:p-10">
                {currentView === 'list' && (
                    <div className="animate-in">
                        <div className="flex gap-4 mb-10">
                            <button onClick={() => setActiveTab('songs')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all ${activeTab === 'songs' ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-slate-800 dark:text-white'}`}>ALABANZAS</button>
                            <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all ${activeTab === 'playlists' ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-slate-800 dark:text-white'}`}>CULTOS</button>
                        </div>

                        {activeTab === 'songs' ? (
                            <>
                                <div className="flex gap-4 mb-8">
                                    <div className="relative flex-1">
                                        <Icon name="search" className="absolute left-5 top-5 opacity-30" />
                                        <input type="text" placeholder="Buscar título..." className="w-full pl-14 pr-6 py-5 rounded-3xl bg-white dark:bg-slate-900 shadow-inner outline-none border-2 border-transparent focus:border-indigo-500 font-bold dark:text-white" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                    </div>
                                    <button onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }} className="btn-3d bg-indigo-600 text-white w-16 h-16 flex items-center justify-center rounded-3xl shrink-0"><Icon name="plus" size={32} /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    {songs.filter(s => s.title?.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                        <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setAiDevotional(null); setCurrentView('view');}} className="p-8 bg-white dark:bg-slate-900 rounded-[40px] border-2 dark:border-slate-800 hover:border-indigo-500 cursor-pointer flex justify-between items-center group shadow-sm transition-all hover:scale-[1.02]">
                                            <div><h3 className="font-black text-xl group-hover:text-indigo-600 uppercase truncate">{s.title}</h3><p className="text-xs opacity-50 font-mono mt-1">[{s.musicalKey || 'G'}] • {s.artist || 'ANÓNIMO'}</p></div>
                                            <Icon name="chevron-right" className="opacity-10 group-hover:opacity-100" />
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button onClick={() => setShowNewPlaylistModal(true)} className="p-14 border-4 border-dashed border-slate-300 dark:border-slate-800 rounded-[48px] text-slate-400 font-black flex flex-col items-center gap-4 hover:bg-white dark:hover:bg-slate-900 transition-all hover:text-indigo-500"><Icon name="folder-plus" size={48} /> <span>NUEVO CULTO</span></button>
                                {playlists.map(p => (
                                    <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView');}} className="p-10 bg-white dark:bg-slate-900 rounded-[48px] border-2 dark:border-slate-800 hover:border-indigo-500 cursor-pointer shadow-md group relative">
                                        <h3 className="text-3xl font-black uppercase italic leading-none mb-4">{p.name}</h3>
                                        <p className="text-sm font-bold text-indigo-500 uppercase tracking-widest">{p.songs?.length || 0} CANCIONES</p>
                                        <button onClick={(e) => {e.stopPropagation(); if(confirm('¿Borrar?')) fb.deleteDoc(fb.doc(fb.db, 'artifacts', 'corario-pro-v32', 'users', user.uid, 'playlists', p.id));}} className="absolute top-8 right-8 text-red-400 opacity-0 group-hover:opacity-100 p-2 hover:bg-red-50 rounded-xl transition-all"><Icon name="trash-2" size={20}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}

                {/* VISTA: LECTURA CANCIÓN */}
                {currentView === 'view' && activeSong && (
                    <div className="animate-in pb-40">
                        <div className="flex justify-between items-center mb-10">
                            <button onClick={() => setCurrentView('list')} className="flex items-center gap-2 text-indigo-600 font-black uppercase text-sm"><Icon name="chevron-left" size={18}/> VOLVER</button>
                            <div className="flex gap-3">
                                <button onClick={() => handleIA('devotional')} className="p-4 bg-amber-100 dark:bg-amber-900/30 text-amber-700 rounded-2xl shadow-md"><Icon name="sparkles" size={24}/></button>
                                <button onClick={() => window.print()} className="p-4 bg-slate-100 dark:bg-slate-800 text-slate-700 rounded-2xl shadow-md"><Icon name="printer" size={24}/></button>
                                <button onClick={() => { 
                                    const s = songs.find(x=>x.id===activeSongId);
                                    setEditTitle(s.title); setEditArtist(s.artist); setEditLyrics(s.lyrics); setEditKey(s.musicalKey);
                                    setCurrentView('edit'); 
                                }} className="p-4 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 rounded-2xl shadow-md"><Icon name="edit-3" size={24}/></button>
                            </div>
                        </div>

                        {aiDevotional && (
                            <div className="bg-amber-50 dark:bg-amber-900/20 p-10 rounded-[48px] mb-14 border-l-[16px] border-amber-400 relative">
                                <button onClick={()=>setAiDevotional(null)} className="absolute top-8 right-8 p-2 opacity-30"><Icon name="x" size={20}/></button>
                                <h4 className="text-[10px] font-black uppercase mb-5 text-amber-800 tracking-[0.3em]">DEVOCIONAL MÚSICO</h4>
                                <div className="italic text-xl leading-relaxed dark:text-amber-100">{aiDevotional}</div>
                            </div>
                        )}

                        <div className="mb-16">
                            <h2 className="text-7xl font-black mb-4 uppercase leading-none tracking-tighter">{activeSong.title}</h2>
                            <p className="text-3xl opacity-40 italic mb-12 uppercase">{activeSong.artist || 'ANÓNIMO'}</p>
                            
                            <div className="flex flex-wrap gap-4 items-center bg-white dark:bg-slate-900 p-5 rounded-[32px] shadow-xl border-2 dark:border-slate-800">
                                <div className="flex items-center gap-3">
                                    <button onClick={()=>setTransposeSteps(s=>s-1)} className="w-14 h-14 bg-slate-50 dark:bg-slate-800 rounded-2xl font-black btn-3d">-</button>
                                    <div className="px-10 font-black text-indigo-600 uppercase tracking-widest text-xl">{transposeSteps === 0 ? (activeSong.musicalKey || 'G') : transposeSteps}</div>
                                    <button onClick={()=>setTransposeSteps(s=>s+1)} className="w-14 h-14 bg-slate-50 dark:bg-slate-800 rounded-2xl font-black btn-3d">+</button>
                                </div>
                                <div className="hidden sm:block h-12 w-px bg-slate-200 dark:bg-slate-700 mx-6"></div>
                                <div className="flex items-center gap-3">
                                    <button onClick={()=>setBpm(b=>Math.max(40, b-5))} className="w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-xl font-bold btn-3d">-</button>
                                    <span className="font-mono font-black text-2xl w-20 text-center">{bpm}</span>
                                    <button onClick={()=>setBpm(b=>Math.min(240, b+5))} className="w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-xl font-bold btn-3d">+</button>
                                    <button onClick={()=>setIsMetronomePlaying(!isMetronomePlaying)} className={`w-14 h-14 rounded-2xl btn-3d shadow-lg ml-2 ${isMetronomePlaying?'bg-red-500':'bg-teal-500'} text-white`}>
                                        <Icon name={isMetronomePlaying ? "pause" : "play"} size={26}/>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="pb-40 px-2 text-3xl font-medium leading-relaxed">{renderLyrics(activeSong.lyrics)}</div>
                    </div>
                )}

                {/* VISTA: EDITOR CON VINCULACIÓN */}
                {currentView === 'edit' && (
                    <div className="animate-in pb-20">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-6">
                            <h2 className="text-5xl font-black uppercase italic tracking-tighter leading-none">Editor</h2>
                            <div className="flex gap-4 w-full sm:w-auto">
                                <button onClick={() => setCurrentView('list')} className="px-6 py-4 font-black opacity-30 hover:opacity-100 text-xs">CANCELAR</button>
                                <button onClick={() => handleIA('reharmonize')} className="flex-1 btn-3d bg-amber-100 text-amber-700 px-8 py-4 rounded-3xl font-black text-xs flex items-center justify-center gap-3 shadow-md" disabled={isAiLoading}>
                                    {isAiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" size={20}/>} IA REARMONIZAR
                                </button>
                                <button onClick={handleSave} className="flex-1 btn-3d bg-indigo-600 text-white px-12 py-4 rounded-3xl font-black text-xs flex items-center justify-center gap-3 shadow-2xl">
                                    <Icon name="save" size={20}/> GUARDAR
                                </button>
                            </div>
                        </div>
                        <div className="space-y-8">
                            <input type="text" placeholder="TÍTULO DE LA ALABANZA..." className="w-full p-8 rounded-[40px] bg-white dark:bg-slate-900 border-4 border-transparent focus:border-indigo-500 font-black text-3xl uppercase outline-none shadow-2xl dark:text-white transition-all" value={editTitle} onChange={e=>setEditTitle(e.target.value)} />
                            <div className="grid grid-cols-2 gap-6">
                                <input type="text" placeholder="AUTOR / ARTISTA" className="w-full p-6 rounded-3xl bg-white dark:bg-slate-900 border-2 dark:border-slate-800 outline-none focus:border-indigo-500 font-bold dark:text-white shadow-inner" value={editArtist} onChange={e=>setEditArtist(e.target.value)} />
                                <input type="text" placeholder="TONO (EJ: G)" className="w-full p-6 rounded-3xl bg-white dark:bg-slate-900 border-2 dark:border-slate-800 outline-none focus:border-indigo-500 font-bold dark:text-white shadow-inner" value={editKey} onChange={e=>setEditKey(e.target.value)} />
                            </div>
                            
                            {/* BOTÓN VINCULAR ACORDES */}
                            <button 
                                onClick={linkChordsManually} 
                                className="w-full py-6 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 rounded-[32px] font-black tracking-widest border-2 border-indigo-200 dark:border-indigo-800 flex items-center justify-center gap-3 hover:bg-indigo-100 transition-all btn-3d btn-3d-secondary"
                            >
                                <Icon name="wand-2" size={24} /> PASO 1: VINCULAR ACORDES CON LETRA
                            </button>

                            <div className="relative">
                                <textarea placeholder="Pega la letra con los acordes encima, por ejemplo:
    G       D
Dios es amor..." 
                                className="w-full h-[650px] p-10 rounded-[64px] bg-white dark:bg-slate-900 border-2 dark:border-slate-800 font-mono text-xl leading-relaxed outline-none focus:ring-8 ring-indigo-500/10 custom-scrollbar resize-none dark:text-white shadow-inner" 
                                value={editLyrics} onChange={e=>setEditLyrics(e.target.value)} />
                            </div>
                        </div>
                    </div>
                )}

                {/* VISTA: CULTO */}
                {currentView === 'playlistView' && activePlaylist && (
                    <div className="animate-in pb-60">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-14 gap-8 border-b-8 border-indigo-500/10 pb-12">
                            <div className="flex-1">
                                <button onClick={() => setCurrentView('list')} className="text-indigo-600 font-black mb-4 flex items-center gap-2 uppercase text-xs tracking-widest"><Icon name="chevron-left" size={18}/> VOLVER A CULTOS</button>
                                <h2 className="text-7xl font-black uppercase tracking-tighter leading-none">{activePlaylist.name}</h2>
                            </div>
                            <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                <button onClick={() => { const url = window.location.href; navigator.clipboard.writeText(url); showToast("Link copiado"); }} className="p-5 bg-white dark:bg-slate-800 rounded-3xl btn-3d shadow-xl"><Icon name="share-2" size={28}/></button>
                                <button onClick={() => setPlaylistMode(playlistMode === 'list' ? 'full' : 'list')} className={`flex-1 md:flex-none btn-3d px-10 py-5 rounded-[32px] font-black text-xs flex items-center justify-center gap-4 shadow-2xl ${playlistMode === 'full' ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-slate-800 dark:text-white'}`}>
                                    <Icon name={playlistMode === 'list' ? "eye" : "settings"} size={24} /> {playlistMode === 'list' ? "MODO PRESENTACIÓN" : "MODO GESTIÓN"}
                                </button>
                                <button onClick={()=>setShowAddSongModal(true)} className="p-5 bg-indigo-600 text-white rounded-3xl btn-3d shadow-2xl"><Icon name="plus" size={32}/></button>
                            </div>
                        </div>

                        {playlistMode === 'list' ? (
                            <div className="space-y-5">
                                {activePlaylist.songs?.map((sid, idx) => {
                                    const s = songs.find(x => x.id === sid);
                                    if (!s) return null;
                                    return (
                                        <div key={idx} className="flex items-center p-8 bg-white dark:bg-slate-900 rounded-[48px] border-2 dark:border-slate-800 shadow-lg group hover:border-indigo-500 transition-all">
                                            <div className="w-16 h-16 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 flex items-center justify-center font-black text-2xl mr-8 shrink-0 shadow-inner">{idx+1}</div>
                                            <div className="flex-1 cursor-pointer truncate" onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view')}}>
                                                <h4 className="font-black text-3xl uppercase tracking-tighter mb-1">{s.title}</h4>
                                                <p className="text-sm opacity-40 font-mono">[{s.musicalKey || 'G'}] • {s.artist}</p>
                                            </div>
                                            <button onClick={async ()=>{ const news = activePlaylist.songs.filter(id => id !== sid); await fb.updateDoc(fb.doc(fb.db, 'artifacts', 'corario-pro-v32', 'users', user.uid, 'playlists', activePlaylist.id), { songs: news }); }} className="p-4 text-red-500 opacity-0 group-hover:opacity-100 transition-all hover:bg-red-50 dark:hover:bg-red-900/30 rounded-3xl"><Icon name="x-circle" size={28}/></button>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="space-y-[30vh]">
                                {activePlaylist.songs?.map((sid, idx) => {
                                    const s = songs.find(x => x.id === sid);
                                    if (!s) return null;
                                    return (
                                        <div key={idx} className="song-presentation animate-in px-4">
                                            <div className="mb-24 border-b-8 border-indigo-600/20 pb-10 flex items-end gap-10">
                                                <span className="text-[14rem] font-black text-indigo-600/5 leading-none -mb-12 select-none">{idx + 1}</span>
                                                <div className="flex-1 pb-6">
                                                    <h3 className="text-8xl font-black dark:text-white leading-none mb-8 tracking-tighter uppercase italic">{s.title}</h3>
                                                    <p className="text-5xl opacity-20 font-black uppercase tracking-widest">TONO: [{s.musicalKey}]</p>
                                                </div>
                                            </div>
                                            <div className="text-5xl font-medium leading-relaxed">{renderLyrics(s.lyrics)}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                )}
              </main>

              {/* CONTROLES FLOTANTES: SCROLL */}
              {(currentView === 'view' || (currentView === 'playlistView' && playlistMode === 'full')) && (
                <div className="fixed bottom-12 right-12 flex flex-col items-center gap-6 z-[100] print:hidden">
                    {isScrolling && (
                        <div className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-3xl p-6 rounded-[48px] shadow-2xl flex flex-col items-center gap-6 border-4 border-indigo-500/20 animate-in slide-in-from-bottom-10">
                            <button onClick={()=>setScrollSpeed(s=>Math.min(10, s+1))} className="w-16 h-16 flex items-center justify-center bg-slate-50 dark:bg-slate-800 rounded-3xl btn-3d shadow-md"><Icon name="chevron-up" size={32}/></button>
                            <div className="flex flex-col items-center"><span className="font-black text-indigo-600 text-3xl leading-none">{scrollSpeed}</span><span className="text-[12px] font-black opacity-30 uppercase mt-2">VEL</span></div>
                            <button onClick={()=>setScrollSpeed(s=>Math.max(1, s-1))} className="w-16 h-16 flex items-center justify-center bg-slate-50 dark:bg-slate-800 rounded-3xl btn-3d shadow-md"><Icon name="chevron-down" size={32}/></button>
                        </div>
                    )}
                    <button onClick={() => setIsScrolling(!isScrolling)} className={`w-28 h-28 rounded-full btn-3d flex items-center justify-center shadow-2xl ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'} text-white transform hover:scale-110 active:scale-95 transition-all`}>
                        <Icon name={isScrolling ? "pause" : "play"} size={56} className={!isScrolling ? "ml-3" : ""} />
                    </button>
                </div>
              )}

              {/* MODAL: NUEVO CULTO */}
              {showNewPlaylistModal && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[1000] animate-in text-center">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[64px] p-14 shadow-2xl relative border-8 border-indigo-500/5">
                        <h3 className="text-4xl font-black uppercase mb-10 italic tracking-tighter leading-none text-slate-900 dark:text-white">Nombre del Culto</h3>
                        <input type="text" placeholder="DOMINGO MAÑANA" className="w-full p-8 bg-slate-50 dark:bg-slate-800 rounded-[32px] mb-12 outline-none focus:ring-8 ring-indigo-500/20 font-black text-center text-2xl uppercase shadow-inner dark:text-white" value={newPlaylistName} onChange={e=>setNewPlaylistName(e.target.value)} autoFocus />
                        <div className="flex gap-4">
                            <button onClick={()=>setShowNewPlaylistModal(false)} className="flex-1 py-5 font-black opacity-20 uppercase text-xs tracking-widest transition-opacity dark:text-white">CANCELAR</button>
                            <button onClick={async () => { 
                                if(newPlaylistName && user){ 
                                    await fb.addDoc(fb.collection(fb.db, 'artifacts', 'corario-pro-v32', 'users', user.uid, 'playlists'), { name: newPlaylistName.trim().toUpperCase(), songs: [], updated: Date.now() }); 
                                    setShowNewPlaylistModal(false); setNewPlaylistName(''); showToast("¡Servicio Creado!"); 
                                } 
                            }} className="flex-1 bg-indigo-600 text-white py-6 rounded-[32px] font-black btn-3d shadow-xl text-sm">CREAR</button>
                        </div>
                    </div>
                </div>
              )}

              {/* MODAL: AÑADIR A CULTO */}
              {showAddSongModal && activePlaylist && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[1000] animate-in">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-[80px] p-12 shadow-2xl max-h-[90vh] flex flex-col border-8 border-indigo-500/5">
                        <div className="flex justify-between items-center mb-12 px-6">
                            <div className="flex-1"><h3 className="text-5xl font-black uppercase italic tracking-tighter leading-none mb-3 text-slate-900 dark:text-white">Tus Alabanzas</h3><p className="text-xs opacity-30 font-black uppercase tracking-[0.3em] text-slate-900 dark:text-white">{activePlaylist.name}</p></div>
                            <button onClick={()=>setShowAddSongModal(false)} className="p-6 bg-slate-50 dark:bg-slate-800 rounded-[32px] opacity-30 hover:opacity-100 transition-all dark:text-white"><Icon name="x" size={32}/></button>
                        </div>
                        <div className="overflow-y-auto space-y-4 flex-1 pr-4 custom-scrollbar px-6 pb-10">
                            {songs.map(s => (
                                <button key={s.id} onClick={async () => {
                                    const hasSong = activePlaylist.songs?.includes(s.id);
                                    let updatedSongs = hasSong ? activePlaylist.songs.filter(id => id !== s.id) : [...(activePlaylist.songs || []), s.id];
                                    showToast(hasSong ? `- ${s.title}` : `+ ${s.title}`, hasSong ? "error" : "success");
                                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', 'corario-pro-v32', 'users', user.uid, 'playlists', activePlaylist.id), { songs: updatedSongs });
                                }} className={`w-full p-8 rounded-[48px] border-4 text-left flex justify-between items-center transition-all ${activePlaylist.songs?.includes(s.id) ? 'bg-indigo-600 border-indigo-400 text-white translate-x-3 shadow-xl' : 'bg-white dark:bg-slate-800 border-transparent hover:border-indigo-500/30'}`}>
                                    <div className="flex-1 truncate pr-8"><p className="font-black text-2xl uppercase tracking-tighter leading-none mb-2">{s.title}</p><p className={`text-xs font-bold uppercase tracking-widest ${activePlaylist.songs?.includes(s.id) ? 'text-indigo-200' : 'opacity-20 text-slate-900 dark:text-white'}`}>{s.artist || 'SIN AUTOR'}</p></div>
                                    <Icon name={activePlaylist.songs?.includes(s.id) ? "check-circle" : "circle-plus"} size={36} />
                                </button>
                            ))}
                        </div>
                        <button onClick={()=>setShowAddSongModal(false)} className="w-full bg-indigo-600 text-white py-8 rounded-[40px] font-black mt-8 btn-3d shadow-2xl tracking-[0.2em] uppercase text-xl">LISTO</button>
                    </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
