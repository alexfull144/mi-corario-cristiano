<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>My Corario - App Oficial</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&family=Playfair+Display:wght@700&display=swap');
        
        :root { --indigo-primary: #4338ca; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            margin: 0; 
            min-height: 100vh;
        }

        .notranslate { translate: no !important; }

        /* --- BOTONES 3D --- */
        .btn-3d {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #1e1b4b; 
            border: 2px solid #1e1b4b;
            font-weight: 800;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e1b4b;
        }
        
        .btn-3d-secondary { box-shadow: 0 4px 0 #334155; border-color: #334155; }

        /* --- RENDERIZADO DE ACORDES --- */
        .chord-line { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.5rem; min-height: 3em; }
        .chord-seg { display: inline-flex; flex-direction: column; vertical-align: bottom; margin-right: 4px; }
        .chord-top { height: 1.4em; font-weight: 900; line-height: 1; white-space: nowrap; margin-bottom: 4px; user-select: none; font-family: 'JetBrains Mono', monospace; }
        .text-bottom { line-height: 1.3; white-space: pre; font-weight: 700; color: inherit; }

        /* MODO IMPRESORA */
        @media print {
            .print-hidden, header, .floating-tools, .modal-overlay, button, .tabs-nav, .search-bar, .tools-container { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; }
            .song-content { page-break-after: always; padding-top: 1cm; }
            .chord-top { color: #000 !important; }
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 10px; }

        /* Colores Dinámicos */
        body { background-color: #f8fafc; color: #020617; }
        .dark body { background-color: #020617 !important; color: #f8fafc !important; }
        
        /* Visibilidad del Título Crítica: Forzada con !important */
        .text-vibrant-day { color: #020617 !important; opacity: 1 !important; font-weight: 900 !important; }
        .dark .text-vibrant-day { color: #ffffff !important; }

        .song-card { background-color: #ffffff; border: 3px solid #000000; box-shadow: 0 6px 0 #000000; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .dark .song-card { background-color: #0f172a; border-color: #1e293b; box-shadow: 0 6px 0 #000000; }
        
        .dragging { opacity: 0.5 !important; transform: scale(0.95); border-style: dashed !important; }

        .font-modern { font-family: 'Inter', sans-serif; }
        .font-elegant { font-family: 'Playfair Display', serif; }
        .font-classic { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        window.FB = { auth, db, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, signInAnonymously, onAuthStateChanged, googleProvider, signInWithRedirect, getRedirectResult, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithCustomToken };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
            const fb = window.FB;
            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [playlists, setPlaylists] = useState([]);
            const [loading, setLoading] = useState(true);
            
            const appId = "my-corario-master-v101"; 

            const [currentView, setCurrentView] = useState('list'); 
            const [activeTab, setActiveTab] = useState('songs');
            const [isDarkMode, setIsDarkMode] = useState(false);
            
            const [activeSongId, setActiveSongId] = useState(null);
            const [activePlaylistId, setActivePlaylistId] = useState(null);
            const [transposeSteps, setTransposeSteps] = useState(0);
            const [textSize, setTextSize] = useState(22);
            const [isScrolling, setIsScrolling] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(2);
            const [bpm, setBpm] = useState(120);
            const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
            
            const [fontStyle, setFontStyle] = useState('font-modern');
            const [lyricColor, setLyricColor] = useState('default');
            const [chordColor, setChordColor] = useState('default');
            const [showStylePanel, setShowStylePanel] = useState(false);

            const [editTitle, setEditTitle] = useState('');
            const [editArtist, setEditArtist] = useState('');
            const [editLyrics, setEditLyrics] = useState('');
            const [editKey, setEditKey] = useState('');

            const [searchQuery, setSearchQuery] = useState('');
            const [toast, setToast] = useState(null);
            const [itemToDelete, setItemToDelete] = useState(null);

            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
            const [newPlaylistName, setNewPlaylistName] = useState('');
            const [showAddSongModal, setShowAddSongModal] = useState(false);
            const [playlistMode, setPlaylistMode] = useState('list');

            const [draggedItemIndex, setDraggedItemIndex] = useState(null);
            const [isDragging, setIsDragging] = useState(false);

            const audioCtxRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // --- LÓGICA DE USUARIO REPARADA ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Capturamos el resultado si el usuario vuelve de Google
                        const result = await fb.getRedirectResult(fb.auth);
                        if (result?.user) {
                            setUser(result.user);
                            showToast("¡Sesión sincronizada!");
                        }
                    } catch (e) { console.error("Error en redirección", e); }

                    fb.onAuthStateChanged(fb.auth, (u) => {
                        setUser(u);
                        if (!u) {
                            fb.signInAnonymously(fb.auth).catch(() => {});
                        }
                        setLoading(false);
                    });
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), (snap) => {
                    setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists'), (snap) => {
                    setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubS(); unsubP(); };
            }, [user]);

            useEffect(() => {
                let interval;
                if (isScrolling) interval = setInterval(() => window.scrollBy(0, scrollSpeed), 50);
                return () => clearInterval(interval);
            }, [isScrolling, scrollSpeed]);

            useEffect(() => {
                let interval;
                if (isMetronomePlaying) {
                    interval = setInterval(() => {
                        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtxRef.current.createOscillator();
                        const gain = audioCtxRef.current.createGain();
                        osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                        osc.frequency.value = 1000;
                        gain.gain.setValueAtTime(0.2, audioCtxRef.current.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05);
                        osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                    }, 60000 / bpm);
                }
                return () => clearInterval(interval);
            }, [isMetronomePlaying, bpm]);

            const lyricStyleMap = { 'default': isDarkMode ? '#f8fafc' : '#020617', 'blue': '#2563eb', 'emerald': '#059669', 'rose': '#e11d48', 'amber': '#d97706' };
            const chordStyleMap = { 'default': '#4338ca', 'red': '#dc2626', 'teal': '#0d9488', 'violet': '#7c3aed', 'orange': '#ea580c' };

            const transposeChord = (chordStr, steps) => {
                if (!chordStr || steps === 0) return chordStr;
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
                return chordStr.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                    let n = m.toUpperCase(); if (mapEs[n]) n = mapEs[n];
                    let idx = notes.indexOf(n.replace('B', '#'));
                    if (idx === -1) idx = notes.indexOf(n);
                    if (idx === -1) return m;
                    let newIdx = (idx + steps) % 12; if (newIdx < 0) newIdx += 12;
                    return notes[newIdx];
                });
            };

            const renderLyrics = (text, steps = transposeSteps) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-4"></div>;
                    const parts = line.split(/(\[[^\]]+\])/g);
                    let segments = []; let lastChord = "";
                    parts.forEach(p => {
                        if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                        else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                    });
                    if (lastChord) segments.push({ chord: lastChord, text: "" });
                    return (
                        <div key={i} className={`chord-line notranslate ${fontStyle}`} translate="no">
                            {segments.map((seg, j) => (
                                <div key={j} className="chord-seg notranslate text-left">
                                    <span className="chord-top notranslate" style={{ fontSize: `${textSize*0.75}px`, color: chordStyleMap[chordColor] }}>
                                        {seg.chord ? transposeChord(seg.chord, steps) : '\u00A0'}
                                    </span>
                                    <span className="text-bottom notranslate" style={{ fontSize: `${textSize}px`, color: lyricStyleMap[lyricColor] }}>
                                        {seg.text || (seg.chord ? '\u00A0' : '')}
                                    </span>
                                </div>
                            ))}
                        </div>
                    );
                });
            };

            const handleSave = async () => {
                if (!editTitle.trim()) return showToast("Falta el título", "error");
                try {
                    const data = { title: editTitle.toUpperCase(), artist: editArtist.toUpperCase(), lyrics: editLyrics, musicalKey: editKey.toUpperCase(), updatedAt: Date.now() };
                    if (activeSongId) await fb.updateDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'songs', activeSongId), data);
                    else await fb.addDoc(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), data);
                    setCurrentView('list'); setEditTitle(''); setEditLyrics('');
                    showToast("¡Alabanza guardada!");
                } catch (e) { showToast("Error al guardar", "error"); }
            };

            const handleAuth = async (type) => {
                try {
                    if (type === 'register') await fb.createUserWithEmailAndPassword(fb.auth, email, pass);
                    else await fb.signInWithEmailAndPassword(fb.auth, email, pass);
                    setShowAuthModal(false); showToast("¡Bienvenido!");
                } catch (e) { showToast("Error: Revisa tus datos", "error"); }
            };

            const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

            const linkChordsManually = () => {
                if (!editLyrics) return;
                const lines = editLyrics.split('\n');
                let result = [];
                const chordRegex = /^([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i;
                for (let i = 0; i < lines.length; i++) {
                    const current = lines[i]; const next = lines[i+1];
                    const words = current.trim().split(/\s+/);
                    const isChordLine = words.length > 0 && words.every(w => chordRegex.test(w));
                    if (isChordLine && next) {
                        let merged = next.split(''); let offset = 0;
                        const regex = /([^\s]+)/g; let m;
                        while ((m = regex.exec(current)) !== null) {
                            const tag = `[${m[0]}]`;
                            merged.splice(Math.min(m.index + offset, merged.length), 0, tag);
                            offset += tag.length;
                        }
                        result.push(merged.join('')); i++; 
                    } else result.push(current);
                }
                setEditLyrics(result.join('\n'));
                showToast("¡Acordes vinculados!");
            };

            const insertBracket = (side) => {
                if (!textareaRef.current) return;
                const start = textareaRef.current.selectionStart;
                const end = textareaRef.current.selectionEnd;
                setEditLyrics(editLyrics.substring(0, start) + (side === 'left' ? '[' : ']') + editLyrics.substring(end));
                setTimeout(() => { textareaRef.current.focus(); textareaRef.current.setSelectionRange(start + 1, start + 1); }, 0);
            };

            const updatePlaylistSongs = async (newSongs) => {
                if (!activePlaylistId) return;
                await fb.updateDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists', activePlaylistId), { songs: newSongs });
            };

            const confirmDelete = async () => {
              if(!itemToDelete) return;
              try {
                  if(itemToDelete.type === 'song') await fb.deleteDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'songs', itemToDelete.id));
                  else if(itemToDelete.type === 'playlist') await fb.deleteDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists', itemToDelete.id));
                  showToast("Eliminado"); setItemToDelete(null);
                  if (currentView !== 'list') setCurrentView('list');
              } catch(e) { showToast("Error al borrar", "error"); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black italic uppercase animate-pulse">Abriendo Corario...</div>;

            const activeSong = songs.find(s => s.id === activeSongId);
            const activePlaylist = playlists.find(p => p.id === activePlaylistId);

            const TransposeToolbar = ({ songKey }) => (
                <div className="flex items-center gap-2 p-2 bg-white dark:bg-slate-900 rounded-3xl border-2 border-slate-950 dark:border-slate-800 shadow-sm print-hidden max-w-fit mt-4">
                    <button onClick={()=>setTransposeSteps(s=>s-1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">-</button>
                    <div className="px-4 font-black text-indigo-600 uppercase text-sm min-w-[100px] text-center">
                        {transposeSteps === 0 ? (songKey || 'G') : transposeChord(songKey || 'G', transposeSteps)}
                    </div>
                    <button onClick={()=>setTransposeSteps(s=>s+1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">+</button>
                </div>
            );

            return (
                <div className="min-h-screen transition-all">
                    {toast && <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] animate-bounce bg-indigo-600 text-white text-xs tracking-widest uppercase`}>{toast.message}</div>}

                    {/* HEADER CON PERFIL MEJORADO */}
                    <header className="sticky top-0 z-40 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => {setCurrentView('list'); setIsScrolling(false);}}>
                            <Icon name="music" size={28} />
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter hidden xs:block">My Corario</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-10 h-10 flex items-center justify-center bg-white/10 dark:bg-slate-800 rounded-xl">
                                <Icon name={isDarkMode ? "sun" : "moon"} size={20} />
                            </button>
                            
                            {user && !user.isAnonymous ? (
                                <div className="flex items-center gap-2 bg-black/30 pl-3 pr-1 py-1 rounded-full border border-white/20 shadow-inner">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-[8px] font-black opacity-60 uppercase leading-none">Cuenta Pro</p>
                                        <p className="text-[10px] font-bold leading-tight truncate max-w-[80px]">{user.displayName || user.email?.split('@')[0] || 'Músico'}</p>
                                    </div>
                                    <button onClick={() => fb.signOut(fb.auth)} className="w-10 h-10 rounded-full border-2 border-indigo-400 overflow-hidden shadow-xl hover:scale-110 active:scale-95 transition-all bg-white flex items-center justify-center">
                                        <img 
                                            src={user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || user.email || 'U')}&background=4338ca&color=fff&bold=true`} 
                                            className="w-full h-full object-cover" 
                                            referrerPolicy="no-referrer"
                                            alt="perfil"
                                            onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'U')}&background=4338ca&color=fff&bold=true` }}
                                        />
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setShowAuthModal(true)} className="btn-3d bg-white text-indigo-700 px-6 py-2 rounded-xl font-black text-xs uppercase tracking-tighter">ENTRAR</button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-10">
                        {currentView === 'list' && (
                            <div className="animate-in">
                                <div className="flex gap-4 mb-10 tabs-nav">
                                    <button onClick={() => setActiveTab('songs')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'songs' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>ALABANZAS</button>
                                    <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'playlists' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>CULTOS</button>
                                </div>

                                {activeTab === 'songs' ? (
                                    <>
                                        <div className="flex gap-4 mb-10 search-bar">
                                            <div className="relative flex-1">
                                                <Icon name="search" className="absolute left-4 top-3.5 opacity-60 text-slate-950 dark:text-white" />
                                                <input type="text" placeholder="Buscar título o artista..." className="w-full pl-12 pr-8 py-3.5 rounded-2xl bg-white dark:bg-slate-900 border-4 border-slate-950 focus:border-indigo-600 font-black text-xl shadow-sm text-slate-950 dark:text-white" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                            </div>
                                            <button onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }} className="btn-3d bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-2xl"><Icon name="plus" size={28} /></button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {songs.filter(s => (s.title || '').toLowerCase().includes(searchQuery.toLowerCase()) || (s.artist || '').toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                                <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view');}} className="p-6 song-card rounded-[32px] cursor-pointer flex justify-between items-center group transition-all text-left">
                                                    <div>
                                                        <h3 className="font-black text-xl uppercase truncate text-vibrant-day">{s.title}</h3>
                                                        <p className="text-xs font-bold mt-1 opacity-60 uppercase tracking-widest text-vibrant-day">[{s.musicalKey || 'G'}] • {s.artist || 'ANÓNIMO'}</p>
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); setItemToDelete({type:'song', id: s.id}); }} className="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <button onClick={() => setShowNewPlaylistModal(true)} className="p-16 border-4 border-dashed border-slate-950 rounded-[56px] text-slate-950 dark:text-slate-400 font-black flex flex-col items-center gap-6 hover:bg-white dark:hover:bg-slate-900 transition-all text-slate-950">
                                            <Icon name="folder-plus" size={56} /> <span className="tracking-[0.3em] uppercase">NUEVO CULTO</span>
                                        </button>
                                        {playlists.map(p => (
                                            <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView');}} className="p-12 song-card rounded-[64px] hover:border-indigo-500 cursor-pointer relative text-left">
                                                <h3 className="text-4xl font-black uppercase italic text-vibrant-day">{p.name}</h3>
                                                <p className="text-sm font-bold text-indigo-600 mt-4 uppercase">{(p.songs || []).length} CANCIONES</p>
                                                <button onClick={(e) => {e.stopPropagation(); setItemToDelete({type:'playlist', id: p.id}); }} className="absolute top-10 right-10 text-red-500"><Icon name="trash-2" size={24}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentView === 'view' && activeSong && (
                            <div className="animate-in pb-40 text-left">
                                <div className="flex justify-between items-center mb-12 print-hidden">
                                    <button onClick={() => { setCurrentView('list'); setIsScrolling(false); }} className="flex items-center gap-2 font-black uppercase text-sm btn-3d bg-indigo-600 text-white px-8 py-4 rounded-3xl transition-all">
                                        <Icon name="chevron-left" size={20}/> VOLVER
                                    </button>
                                    <div className="flex gap-2">
                                        <button className="p-4 bg-white dark:bg-slate-800 text-indigo-600 rounded-2xl btn-3d btn-3d-secondary shadow-lg" onClick={() => setShowStylePanel(!showStylePanel)}><Icon name="palette" size={28}/></button>
                                        <button onClick={() => window.print()} className="p-4 bg-slate-800 text-white rounded-2xl btn-3d shadow-lg"><Icon name="printer" size={28}/></button>
                                        <button onClick={() => { setEditTitle(activeSong.title); setEditArtist(activeSong.artist || ''); setEditLyrics(activeSong.lyrics); setEditKey(activeSong.musicalKey || ''); setCurrentView('edit'); }} className="p-4 bg-indigo-600 text-white rounded-2xl btn-3d shadow-lg"><Icon name="edit-3" size={28}/></button>
                                    </div>
                                </div>
                                <h2 className="text-7xl md:text-9xl font-black mb-6 uppercase tracking-tighter italic text-vibrant-day">{activeSong.title}</h2>
                                <p className="text-4xl opacity-60 italic mb-14 uppercase tracking-widest text-vibrant-day">{activeSong.artist || 'MÚSICA CRISTIANA'}</p>
                                <TransposeToolbar songKey={activeSong.musicalKey} />
                                <div className="pb-60 pt-10 font-bold leading-relaxed">{renderLyrics(activeSong.lyrics, transposeSteps)}</div>
                            </div>
                        )}

                        {currentView === 'playlistView' && activePlaylist && (
                            <div className="animate-in pb-60 text-left">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-10 border-b-8 border-indigo-500/10 pb-14 print-hidden">
                                    <div className="flex-1">
                                        <button onClick={() => setCurrentView('list')} className="flex items-center gap-2 font-black uppercase text-sm btn-3d bg-indigo-600 text-white px-8 py-4 rounded-3xl transition-all hover:scale-105 shadow-xl mb-6">
                                            <Icon name="chevron-left" size={20}/> VOLVER
                                        </button>
                                        <h2 className="text-8xl font-black uppercase tracking-tighter italic text-vibrant-day leading-tight">{activePlaylist.name}</h2>
                                    </div>
                                    <div className="flex flex-wrap gap-5 w-full md:w-auto">
                                        <button onClick={() => setPlaylistMode(playlistMode === 'list' ? 'full' : 'list')} className={`flex-1 md:flex-none btn-3d px-12 py-6 rounded-[40px] font-black text-sm tracking-widest flex items-center justify-center gap-4 shadow-2xl transition-all ${playlistMode === 'list' ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-700'}`}>
                                            <Icon name={playlistMode === 'list' ? "eye" : "layout-list"} size={28} /> {playlistMode === 'list' ? "PRESENTACIÓN" : "VER LISTA"}
                                        </button>
                                        <button onClick={()=>setShowAddSongModal(true)} className="p-6 bg-indigo-600 text-white rounded-[32px] btn-3d shadow-2xl border-4 border-indigo-800"><Icon name="plus" size={40}/></button>
                                    </div>
                                </div>
                                {playlistMode === 'list' ? (
                                    <div className="space-y-4">
                                        {(activePlaylist.songs || []).map((sid, idx) => {
                                            const s = songs.find(x => x.id === sid);
                                            if (!s) return null;
                                            return (
                                                <div key={idx} className="flex items-center p-8 song-card rounded-[40px] border-4 shadow-inner">
                                                    <div className="w-14 h-14 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 flex items-center justify-center font-black text-2xl mr-6">{idx+1}</div>
                                                    <div className="flex-1 cursor-pointer truncate pr-4" onClick={() => {setActiveSongId(s.id); setCurrentView('view')}}>
                                                        <h4 className="font-black text-2xl uppercase text-vibrant-day leading-tight font-bold">{s.title}</h4>
                                                        <p className="text-sm opacity-60 font-black tracking-widest text-vibrant-day">[{s.musicalKey || 'G'}] • {s.artist}</p>
                                                    </div>
                                                    <button onClick={async ()=>{ const news = activePlaylist.songs.filter((_, i) => i !== idx); await updatePlaylistSongs(news); }} className="p-3 text-red-500 hover:bg-red-50 rounded-2xl"><Icon name="x" size={24}/></button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="space-y-[50vh] pb-80">
                                        {(activePlaylist.songs || []).map((sid, idx) => {
                                            const s = songs.find(x => x.id === sid);
                                            if (!s) return null;
                                            return (
                                                <div key={idx} className="song-presentation animate-in px-4">
                                                    <div className="mb-24 border-b-[15px] border-indigo-600/10 pb-12 flex items-end gap-12 text-vibrant-day">
                                                        <span className="text-[18rem] font-black text-indigo-600 leading-none -mb-16 select-none">{idx + 1}</span>
                                                        <div className="flex-1 pb-8">
                                                            <h3 className={`text-8xl sm:text-[11rem] font-black leading-none mb-10 tracking-tighter uppercase italic text-vibrant-day ${fontStyle}`}>{s.title}</h3>
                                                            <div className="flex flex-wrap items-center gap-6 opacity-80 font-black text-4xl tracking-widest uppercase mb-10 text-vibrant-day">
                                                              <span>TONO: [{s.musicalKey}]</span><span className="opacity-50 text-indigo-400">•</span><span>{s.artist}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="text-7xl font-black leading-[2] text-vibrant-day" translate="no">{renderLyrics(s.lyrics, 0)}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentView === 'edit' && (
                            <div className="animate-in pb-20 text-left">
                                <h2 className="text-6xl font-black uppercase italic mb-10 text-vibrant-day leading-none">Editor</h2>
                                <div className="space-y-10">
                                    <input type="text" placeholder="Título..." className="w-full p-10 rounded-[48px] border-4 border-slate-950 focus:border-indigo-600 font-black text-4xl uppercase outline-none shadow-inner dark:bg-slate-900 text-slate-950 dark:text-white" value={editTitle} onChange={e=>setEditTitle(e.target.value)} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                        <input type="text" placeholder="Compositor..." className="w-full p-8 rounded-[32px] border-4 border-slate-700 font-black text-xl dark:bg-slate-900 shadow-inner text-slate-950 dark:text-white" value={editArtist} onChange={e=>setEditArtist(e.target.value)} />
                                        <input type="text" placeholder="Tono..." className="w-full p-8 rounded-[32px] border-4 border-slate-700 font-black text-xl dark:bg-slate-900 shadow-inner text-slate-950 dark:text-white" value={editKey} onChange={e=>setEditKey(e.target.value)} />
                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-4">
                                        <button onClick={linkChordsManually} className="flex-1 py-10 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 rounded-[40px] font-black text-2xl border-4 border-indigo-600 flex items-center justify-center gap-5 btn-3d uppercase">
                                            <Icon name="wand-2" size={40} /> VINCULAR ACORDES
                                        </button>
                                        <div className="flex gap-4">
                                            <button onClick={() => insertBracket('left')} className="w-20 h-20 bg-white dark:bg-slate-800 rounded-3xl btn-3d text-4xl font-black">[</button>
                                            <button onClick={() => insertBracket('right')} className="w-20 h-20 bg-white dark:bg-slate-800 rounded-3xl btn-3d text-4xl font-black">]</button>
                                        </div>
                                    </div>
                                    <textarea ref={textareaRef} placeholder="Pega letra con [Acordes]..." className="w-full h-[700px] p-12 rounded-[80px] border-4 border-slate-300 font-mono text-2xl outline-none focus:ring-[30px] ring-indigo-500/5 dark:bg-slate-900 shadow-inner text-slate-950 dark:text-white font-bold" value={editLyrics} onChange={e=>setEditLyrics(e.target.value)} />
                                    <button onClick={handleSave} className="w-full py-8 bg-indigo-600 text-white rounded-[40px] font-black btn-3d uppercase text-2xl shadow-2xl tracking-widest">GUARDAR ALABANZA</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* CONTROLES FLOTANTES */}
                    {currentView === 'view' && (
                        <div className="fixed bottom-8 right-8 flex flex-col items-end gap-4 z-[100] no-print">
                            <div className="flex items-center gap-2 p-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur rounded-full shadow-2xl border-4 border-slate-950">
                                <span className="font-black text-indigo-600 text-sm px-2">{bpm} <span className="text-[8px] opacity-40">BPM</span></span>
                                <button onClick={()=>setIsMetronomePlaying(!isMetronomePlaying)} className={`w-10 h-10 rounded-full flex items-center justify-center ${isMetronomePlaying?'bg-red-500':'bg-emerald-600'} text-white shadow-lg`}><Icon name={isMetronomePlaying ? "pause" : "music"} size={16}/></button>
                            </div>
                            <div className="flex items-center gap-3 p-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur rounded-full shadow-2xl border-4 border-slate-950">
                                {isScrolling && (
                                    <div className="flex items-center gap-2 pr-2 border-r border-slate-300">
                                        <button className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full" onClick={() => setScrollSpeed(s => Math.max(1, s - 1))}><Icon name="rewind" size={18}/></button>
                                        <span className="font-black text-indigo-600 px-1 text-sm">{scrollSpeed}x</span>
                                        <button className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full" onClick={() => setScrollSpeed(s => Math.min(10, s + 1))}><Icon name="fast-forward" size={18}/></button>
                                    </div>
                                )}
                                <button onClick={() => setIsScrolling(!isScrolling)} className={`p-6 rounded-full text-white shadow-xl transition-all ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'}`}><Icon name={isScrolling ? "pause" : "play"} size={32} /></button>
                            </div>
                        </div>
                    )}

                    {/* MODAL AUTH DUAL REPARADO */}
                    {showAuthModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[1000] text-center backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[56px] p-10 border-[12px] border-indigo-600/10 shadow-2xl relative animate-in">
                                <button onClick={()=>setShowAuthModal(false)} className="absolute top-8 right-8 opacity-30 p-2 hover:opacity-100 transition-opacity"><Icon name="x" size={32}/></button>
                                <h3 className="text-3xl font-black uppercase italic mb-8">MI CUENTA</h3>
                                
                                <div className="flex gap-4 mb-8">
                                    <button onClick={()=>setAuthMode('login')} className={`flex-1 py-3 rounded-2xl font-black border-4 ${authMode==='login'?'bg-indigo-600 text-white border-indigo-800':'border-transparent opacity-40'}`}>ENTRAR</button>
                                    <button onClick={()=>setAuthMode('register')} className={`flex-1 py-3 rounded-2xl font-black border-4 ${authMode==='register'?'bg-indigo-600 text-white border-indigo-800':'border-transparent opacity-40'}`}>CREAR</button>
                                </div>

                                <div className="space-y-6">
                                    <button 
                                        onClick={() => fb.signInWithRedirect(fb.auth, fb.googleProvider)} 
                                        className="w-full py-6 bg-white dark:bg-slate-800 border-4 border-slate-950 rounded-3xl font-black text-sm flex items-center justify-center gap-4 shadow-xl active:translate-y-1 transition-all mb-4"
                                    >
                                        <img src="https://www.google.com/favicon.ico" className="w-8 h-8" /> ENTRAR CON GOOGLE
                                    </button>
                                    
                                    <div className="relative py-2"><div className="absolute inset-0 flex items-center"><div className="w-full border-t-4 border-slate-100 dark:border-slate-800"></div></div><div className="relative flex justify-center text-xs uppercase"><span className="bg-white dark:bg-slate-900 px-4 font-black opacity-30">O CON CORREO</span></div></div>

                                    <div className="space-y-4">
                                        <input type="email" placeholder="EMAIL" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none shadow-inner" value={email} onChange={e=>setEmail(e.target.value)} />
                                        <input type="password" placeholder="CONTRASEÑA" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none shadow-inner" value={pass} onChange={e=>setPass(e.target.value)} />
                                        <button onClick={() => handleAuth(authMode === 'login' ? 'login' : 'register')} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black btn-3d uppercase">CONTINUAR</button>
                                    </div>
                                </div>
                                <p className="text-[10px] opacity-40 uppercase font-black px-6 mt-8">Tus alabanzas se sincronizan en la nube automáticamente.</p>
                            </div>
                        </div>
                    )}

                    {/* CONFIRMACIÓN BORRADO */}
                    {itemToDelete && (
                      <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-6 z-[1000] animate-in zoom-in-95">
                        <div className="bg-white dark:bg-slate-900 rounded-[56px] p-12 max-w-sm w-full shadow-2xl text-center border-8 border-red-500/10">
                          <div className="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-8 animate-pulse"><Icon name="trash-2" size={48} /></div>
                          <h3 className="text-4xl font-black mb-4 dark:text-white uppercase tracking-tighter">¿Borrar?</h3>
                          <div className="flex gap-4">
                            <button onClick={()=>setItemToDelete(null)} className="flex-1 py-5 font-black bg-slate-100 dark:bg-slate-800 rounded-3xl text-slate-500 uppercase">NO</button>
                            <button onClick={confirmDelete} className="flex-1 py-5 bg-red-600 text-white rounded-3xl font-black shadow-lg shadow-red-500/20 active:scale-95 transition-all uppercase">BORRAR</button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* MODAL NUEVO CULTO */}
                    {showNewPlaylistModal && (
                      <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[110] animate-in zoom-in-95">
                        <div className="bg-white dark:bg-slate-900 rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center border-8 border-indigo-600/10">
                          <h3 className="text-2xl font-black mb-6 dark:text-white uppercase">Nombre del Culto</h3>
                          <input type="text" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 dark:text-white outline-none focus:border-indigo-500 mb-6 text-slate-950 font-bold uppercase text-center shadow-inner" placeholder="DOMINGO MAÑANA" value={newPlaylistName} onChange={e=>setNewPlaylistName(e.target.value)} autoFocus />
                          <div className="flex gap-3">
                            <button onClick={()=>setShowNewPlaylistModal(false)} className="flex-1 py-3 font-bold opacity-50 uppercase">CERRAR</button>
                            <button onClick={async ()=>{ if(newPlaylistName && user){ await fb.addDoc(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists'), { name: newPlaylistName.trim().toUpperCase(), songs: [], updatedAt: Date.now() }); setShowNewPlaylistModal(false); setNewPlaylistName(''); showToast("CULTO CREADO"); } }} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg uppercase">CREAR</button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* MODAL AÑADIR A CULTO */}
                    {showAddSongModal && activePlaylist && (
                      <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[110] animate-in zoom-in-95">
                        <div className="bg-white dark:bg-slate-900 rounded-[48px] p-8 max-w-md w-full shadow-2xl max-h-[80vh] flex flex-col border-8 border-indigo-600/10">
                          <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-black truncate pr-4 dark:text-white uppercase">Añadir a {activePlaylist.name}</h3>
                            <button onClick={()=>setShowAddSongModal(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all"><Icon name="x" size={24}/></button>
                          </div>
                          <div className="overflow-y-auto space-y-3 flex-1 pr-1 custom-scrollbar">
                            {songs.map(s => (
                              <button key={s.id} onClick={async () => { 
                                const news = (activePlaylist.songs || []).includes(s.id) ? (activePlaylist.songs || []).filter(id => id !== s.id) : [...(activePlaylist.songs || []), s.id];
                                await updatePlaylistSongs(news);
                                showToast((activePlaylist.songs || []).includes(s.id) ? "QUITADA" : "AÑADIDA");
                              }} className={`w-full p-5 rounded-3xl border-2 text-left flex justify-between items-center transition-all ${(activePlaylist.songs || []).includes(s.id) ? 'bg-green-50 border-green-200 dark:bg-green-900/20' : 'hover:bg-indigo-50 border-transparent dark:border-slate-800 shadow-sm'}`}>
                                <div className="overflow-hidden pr-2">
                                  <p className="font-bold truncate dark:text-white uppercase">{s.title}</p>
                                  <p className="text-xs opacity-50 font-mono tracking-widest">[{s.musicalKey}] • {s.artist}</p>
                                </div>
                                {(activePlaylist.songs || []).includes(s.id) ? <Icon name="check" className="text-green-600" /> : <Icon name="plus" className="text-indigo-600" />}
                              </button>
                            ))}
                          </div>
                          <button onClick={()=>setShowAddSongModal(false)} className="w-full mt-6 py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg text-center uppercase tracking-widest shadow-xl">TERMINAR</button>
                        </div>
                      </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
