<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Corario AI - Ministerio Musical</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&display=swap');
        
        :root { --indigo-primary: #6366f1; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
            margin: 0; 
            min-height: 100vh; 
        }

        .notranslate { translate: no !important; }

        /* Renderizado de Acordes Superior */
        .chord-segment {
            display: inline-flex;
            flex-direction: column;
            vertical-align: bottom;
            margin-right: 1px;
        }
        .chord-visual {
            height: 1.5em;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
            margin-bottom: 2px;
            display: block;
            user-select: none;
            color: var(--indigo-primary);
        }
        .text-visual {
            line-height: 1.2;
            white-space: pre;
            display: block;
        }
        .lyric-line {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            min-height: 2.8em;
            align-items: flex-end;
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }

        /* Evitar que Lucide rompa el Layout */
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE DEL USUARIO
        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "corario-master-v28";

        window.FB = { auth, db, appId, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente Icono Mejorado
        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`icon-box ${className}`}></span>;
        };

        function App() {
          const fb = window.FB;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [loading, setLoading] = useState(true);
          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [activeSongId, setActiveSongId] = useState(null);
          const [activePlaylistId, setActivePlaylistId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [transposeSteps, setTransposeSteps] = useState(0);

          // Estados Editor
          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editKey, setEditKey] = useState('');
          const [editLyrics, setEditLyrics] = useState('');

          const [isAiLoading, setIsAiLoading] = useState(false);
          const [toast, setToast] = useState(null);
          const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
          const [newPlaylistName, setNewPlaylistName] = useState('');
          const [showAddSongModal, setShowAddSongModal] = useState(false);
          const [playlistMode, setPlaylistMode] = useState('list');

          // Inicialización
          useEffect(() => {
            fb.signInAnonymously(fb.auth);
            fb.onAuthStateChanged(fb.auth, (u) => {
              setUser(u);
              setLoading(false);
            });
          }, []);

          // Sincronización Firestore
          useEffect(() => {
            if (!user) return;
            const songsPath = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs');
            const unsubS = fb.onSnapshot(songsPath, (snap) => {
              setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });

            const playsPath = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists');
            const unsubP = fb.onSnapshot(playsPath, (snap) => {
              setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });

            return () => { unsubS(); unsubP(); };
          }, [user]);

          // Aplicar tema al HTML
          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          const showToast = (message, type = "success") => { 
            setToast({message, type}); 
            setTimeout(() => setToast(null), 3000); 
          };

          // --- IA GEMINI 2.5 RECONSTRUIDA ---
          const handleIA = async () => {
            if (!editLyrics) return showToast("Escribe la letra primero", "error");
            setIsAiLoading(true);

            const apiKey = "AIzaSyB8eQAgc68ME2eS0pq5WW1fEVwZ3shKaUQ"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: editLyrics }] }],
                  systemInstruction: { parts: [{ text: "Actúa como músico profesional de alabanza. Re-armoniza la canción con acordes de piano enriquecidos. REGLAS: 1. Devuelve SOLAMENTE el texto. 2. Acordes en corchetes [Acorde] antes de la sílaba. 3. Usa Cifrado Americano (A,B,C,D,E,F,G). Sin comentarios." }] }
                })
              });
              
              const data = await response.json();
              const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
              
              if (result) {
                setEditLyrics(result.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim());
                showToast("¡IA: Alabanza Mejorada!");
              } else {
                throw new Error();
              }
            } catch (e) {
              showToast("Error de conexión con la IA. Intenta de nuevo.", "error");
            } finally {
              setIsAiLoading(false);
            }
          };

          const transposeChord = (chord, steps) => {
            if (!chord || steps === 0) return chord;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
            return chord.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                let n = m.toUpperCase();
                if (mapEs[n]) n = mapEs[n];
                let idx = notes.indexOf(n);
                if (idx === -1) return m;
                let newIdx = (idx + steps) % 12;
                if (newIdx < 0) newIdx += 12;
                return notes[newIdx];
            });
          };

          const renderLyrics = (text, steps = transposeSteps) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
              if (!line.trim()) return <div key={i} className="h-4"></div>;
              const parts = line.split(/(\[[^\]]+\])/g);
              let segments = [];
              let lastChord = "";
              parts.forEach(p => {
                if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
              });
              if (lastChord) segments.push({ chord: lastChord, text: "" });

              return (
                <div key={i} className="lyric-line notranslate" translate="no">
                  {segments.map((seg, j) => (
                    <div key={j} className="chord-segment notranslate" translate="no">
                      <span className="chord-visual font-mono notranslate" translate="no">
                        {seg.chord ? transposeChord(seg.chord, steps) : '\u00A0'}
                      </span>
                      <span className="text-visual notranslate" translate="no">
                        {seg.text || (seg.chord ? '\u00A0' : '')}
                      </span>
                    </div>
                  ))}
                </div>
              );
            });
          };

          const handleSave = async () => {
            if (!editTitle.trim()) return showToast("Falta el título", "error");
            try {
                const data = { title: editTitle, artist: editArtist, musicalKey: editKey, lyrics: editLyrics, updatedAt: Date.now() };
                if (activeSongId) {
                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs', activeSongId), data);
                    showToast("¡Actualizada!");
                } else {
                    await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs'), data);
                    showToast("¡Guardada!");
                }
                setCurrentView('list');
                setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey('');
            } catch (e) { showToast("Error al guardar", "error"); }
          };

          const activeSong = songs.find(s => s.id === activeSongId);
          const activePlaylist = playlists.find(p => p.id === activePlaylistId);

          if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black animate-pulse uppercase">Corario AI...</div>;

          return (
            <div className="min-h-screen">
              
              {toast && <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] animate-bounce ${toast.type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white`}>{toast.message}</div>}

              {/* HEADER CON ARQUITECTURA FIJA */}
              <header className="sticky top-0 z-50 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-lg">
                <div className="max-w-4xl mx-auto flex flex-row justify-between items-center w-full">
                  
                  {/* Lado Izquierdo: Logo */}
                  <div 
                    className="flex flex-row items-center gap-3 cursor-pointer select-none" 
                    onClick={() => { setCurrentView('list'); setPlaylistMode('list'); }}
                  >
                    <Icon name="music" size={32} className="text-indigo-200" />
                    <h1 className="text-2xl font-black italic uppercase tracking-tighter leading-none">Corario AI</h1>
                  </div>

                  {/* Lado Derecho: Acciones */}
                  <div className="flex flex-row items-center gap-3">
                    <button 
                      onClick={() => setIsDarkMode(!isDarkMode)} 
                      className="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-full transition-all active:scale-90"
                    >
                      <Icon name={isDarkMode ? "sun" : "moon"} size={22} />
                    </button>
                    
                    {currentView === 'list' && (
                      <button 
                        className="bg-white text-indigo-700 px-5 py-2 rounded-full font-bold text-sm shadow-md hover:scale-105 active:scale-95 transition-all"
                        onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }}
                      >
                        + Nueva
                      </button>
                    )}
                  </div>

                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 md:p-8">
                {/* VISTA: LISTA PRINCIPAL */}
                {currentView === 'list' && (
                  <div className="animate-in">
                    <div className="flex gap-2 p-1 bg-slate-200 dark:bg-slate-800 rounded-2xl mb-8">
                        <button onClick={() => setActiveTab('songs')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab === 'songs' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Alabanzas</button>
                        <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab === 'playlists' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Cultos</button>
                    </div>

                    <div className="relative mb-8">
                        <Icon name="search" className="absolute left-4 top-3.5 opacity-30" size={20} />
                        <input type="text" placeholder="Buscar título o compositor..." className="w-full pl-12 pr-4 py-3.5 rounded-2xl border-2 dark:bg-slate-900 border-transparent focus:border-indigo-500 outline-none shadow-sm dark:text-white transition-all" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {activeTab === 'songs' ? songs.filter(s => s.title.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                            <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view')}} className="p-5 bg-white dark:bg-slate-900 rounded-3xl border-2 dark:border-slate-800 hover:border-indigo-500 cursor-pointer flex justify-between items-center shadow-sm group transition-all">
                                <div><h3 className="font-bold text-lg group-hover:text-indigo-600">{s.title}</h3><p className="text-xs opacity-50 uppercase tracking-widest font-mono">{s.artist || 'Autor'} • [{s.musicalKey || 'G'}]</p></div>
                                <Icon name="chevron-right" className="opacity-20" />
                            </div>
                        )) : <>
                            <button onClick={() => setShowNewPlaylistModal(true)} className="p-12 border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl text-slate-400 font-bold hover:bg-indigo-50 dark:hover:bg-indigo-900/10 transition-all flex flex-col items-center gap-2">
                                <Icon name="folder-plus" size={32} />
                                <span>Crear Nuevo Culto</span>
                            </button>
                            {playlists.map(p => (
                                <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView')}} className="p-6 bg-white dark:bg-slate-900 rounded-3xl border-2 dark:border-slate-800 hover:border-indigo-500 cursor-pointer shadow-sm group">
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="font-black text-xl flex items-center gap-2"><Icon name="list-music" className="text-indigo-500" /> {p.name}</h3>
                                        <button onClick={(e) => { e.stopPropagation(); if(confirm("¿Borrar?")) fb.deleteDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists', p.id)); }} className="text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={16}/></button>
                                    </div>
                                    <p className="text-sm opacity-50">{p.songs?.length || 0} alabanzas seleccionadas</p>
                                </div>
                            ))}
                        </>}
                    </div>
                  </div>
                )}

                {/* VISTA: LECTURA CANCIÓN */}
                {currentView === 'view' && activeSong && (
                  <div className="animate-in pb-32">
                    <div className="flex justify-between items-center mb-8">
                      <button className="flex items-center gap-2 text-indigo-600 font-bold hover:underline" onClick={() => setCurrentView('list')}><Icon name="chevron-left" size={18} /> Volver</button>
                      <div className="flex gap-2">
                        <button className="p-3 bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 rounded-2xl" onClick={() => setShowStylePanel(!showStylePanel)}><Icon name="palette" size={20}/></button>
                        <button className="p-3 bg-slate-800 text-white rounded-2xl" onClick={() => window.print()}><Icon name="printer" size={20}/></button>
                        <button className="p-3 border-2 rounded-2xl dark:border-slate-800" onClick={() => { 
                            setEditTitle(activeSong.title); setEditArtist(activeSong.artist || ''); 
                            setEditLyrics(activeSong.lyrics); setEditKey(activeSong.musicalKey || ''); 
                            setCurrentView('edit'); 
                        }}><Icon name="edit-2" size={20}/></button>
                      </div>
                    </div>

                    <div className="mb-10"><h2 className="text-5xl font-black mb-2 leading-tight">{activeSong.title}</h2><p className="text-xl opacity-60 italic mb-6">{activeSong.artist || 'Autor desconocido'}</p>
                      <div className="flex flex-wrap gap-4 items-center">
                        <div className="flex items-center bg-white dark:bg-slate-900 rounded-2xl border-2 p-1 shadow-sm">
                            <button className="w-10 h-10 font-black hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl" onClick={() => setTransposeSteps(s => s - 1)}>-</button>
                            <span className="px-4 text-indigo-600 font-black min-w-[80px] text-center">{transposeSteps === 0 ? (activeSong.musicalKey || 'Tono') : transposeSteps}</span>
                            <button className="w-10 h-10 font-black hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl" onClick={() => setTransposeSteps(s => s + 1)}>+</button>
                        </div>
                      </div>
                    </div>
                    <div className="space-y-1 pb-20" translate="no">{renderLyrics(activeSong.lyrics)}</div>
                  </div>
                )}

                {/* VISTA: EDITOR */}
                {currentView === 'edit' && (
                  <div className="animate-in pb-20">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <h2 className="text-3xl font-black uppercase italic">{activeSongId ? 'Editando' : 'Nueva Alabanza'}</h2>
                        <div className="flex gap-2 w-full md:w-auto">
                            <button onClick={() => setCurrentView('list')} className="px-4 py-2 font-bold opacity-50 dark:text-white">Cancelar</button>
                            <button onClick={handleIA} className="flex-1 md:flex-none bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-200 transition-all shadow-sm" disabled={isAiLoading}>{isAiLoading ? <Icon name="loader-2" /> : <Icon name="sparkles" size={18} />} IA Rearmonizar</button>
                        </div>
                    </div>
                    <div className="space-y-4">
                        <input type="text" placeholder="Título..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white outline-none focus:border-indigo-500 text-xl font-bold shadow-sm" value={editTitle} onChange={e => setEditTitle(e.target.value)} />
                        <div className="grid grid-cols-2 gap-4"><input type="text" placeholder="Autor..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white outline-none focus:border-indigo-500 font-bold" value={editArtist} onChange={e => setEditArtist(e.target.value)} /><input type="text" placeholder="Tono (Ej: G)..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white outline-none focus:border-indigo-500 font-bold" value={editKey} onChange={e => setEditKey(e.target.value)} /></div>
                        <textarea placeholder="Pega letra con [Acorde] aquí..." className="w-full h-96 p-6 rounded-3xl border-2 dark:bg-slate-900 dark:text-white font-mono text-sm leading-relaxed shadow-sm outline-none focus:border-indigo-500" value={editLyrics} onChange={e => setEditLyrics(e.target.value)} />
                        <button className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all" onClick={handleSave}>GUARDAR CAMBIOS</button>
                    </div>
                  </div>
                )}
                
                {/* VISTA: CULTO SELECCIONADO */}
                {currentView === 'playlistView' && activePlaylist && (
                  <div className="animate-in pb-40">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 border-b dark:border-slate-800 pb-6">
                        <div><button onClick={() => setCurrentView('list')} className="text-indigo-600 font-bold flex items-center gap-1 mb-2 hover:underline"><Icon name="chevron-left" size={16}/> Volver</button><h2 className="text-4xl font-black dark:text-white">{activePlaylist.name}</h2></div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <button onClick={handleShare} className="p-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl shadow-md"><Icon name="share-2" size={20} /></button>
                            <button onClick={() => setPlaylistMode(playlistMode === 'list' ? 'full' : 'list')} className={`flex-1 md:flex-none px-6 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all ${playlistMode === 'full' ? 'bg-indigo-600 text-white' : 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300'}`}><Icon name={playlistMode === 'list' ? "eye" : "layout-list"} size={20} /> {playlistMode === 'list' ? "Modo Presentación" : "Ver Lista"}</button>
                            <button onClick={()=>setShowAddSongModal(true)} className="p-3 bg-indigo-600 text-white rounded-2xl shadow-lg hover:bg-indigo-700"><Icon name="plus" size={20}/></button>
                        </div>
                    </div>
                    
                    {playlistMode === 'list' ? (
                      <div className="space-y-4">
                        {activePlaylist.songs?.map((sid, idx) => {
                          const s = songs.find(x => x.id === sid);
                          if (!s) return null;
                          return (
                            <div key={idx} className="flex items-center p-5 bg-white dark:bg-slate-900 rounded-3xl border-2 dark:border-slate-800 shadow-sm group">
                              <div className="w-10 h-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center font-black mr-4 shrink-0">{idx+1}</div>
                              <div className="flex-1 cursor-pointer truncate" onClick={() => {setActiveSongId(s.id); setCurrentView('view')}}><h4 className="font-bold text-lg dark:text-white">{s.title}</h4><p className="text-sm opacity-50 tracking-wider font-mono uppercase">{s.artist} • [{s.musicalKey}]</p></div>
                              <button onClick={async ()=>{ const news = activePlaylist.songs.filter(id => id !== sid); await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists', activePlaylist.id), { songs: news }); }} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 rounded-lg"><Icon name="x" size={18}/></button>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="space-y-40">
                        {activePlaylist.songs?.map((sid, idx) => {
                          const s = songs.find(x => x.id === sid);
                          if (!s) return null;
                          return (
                            <div key={idx} className="song-page animate-in">
                              <div className="mb-10 border-b-4 border-indigo-600/20 pb-4"><span className="text-7xl font-black text-indigo-600/10 block mb-2">{idx + 1}</span><h3 className="text-4xl font-black dark:text-white leading-tight uppercase italic">{s.title}</h3><p className="text-xl opacity-60 italic dark:text-slate-400">{s.artist} • [{s.musicalKey}]</p></div>
                              <div className="text-2xl overflow-x-auto notranslate" translate="no">{renderLyrics(s.lyrics, 0)}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </main>

              {/* MODAL NUEVO CULTO */}
              {showNewPlaylistModal && (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[110] animate-in">
                  <div className="bg-white dark:bg-slate-900 rounded-3xl p-6 max-w-sm w-full shadow-2xl">
                    <h3 className="text-xl font-bold mb-4 dark:text-white">Nombre del Culto</h3>
                    <input type="text" className="w-full p-4 rounded-2xl border-2 dark:bg-slate-800 dark:border-slate-700 dark:text-white outline-none focus:border-indigo-500 mb-6" placeholder="Ej: Servicio Domingo" value={newPlaylistName} onChange={e=>setNewPlaylistName(e.target.value)} autoFocus />
                    <div className="flex gap-3">
                      <button onClick={()=>setShowNewPlaylistModal(false)} className="flex-1 py-3 font-bold opacity-50">Cerrar</button>
                      <button onClick={async ()=>{ if(newPlaylistName && user){ await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists'), { name: newPlaylistName, songs: [], updatedAt: Date.now() }); setShowNewPlaylistModal(false); setNewPlaylistName(''); showToast("Culto Creado"); } }} className="flex-1 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Crear</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL AÑADIR A CULTO */}
              {showAddSongModal && activePlaylist && (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[110] animate-in">
                  <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 max-w-md w-full shadow-2xl max-h-[80vh] flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold truncate pr-4 dark:text-white">Añadir a {activePlaylist.name}</h3>
                      <button onClick={()=>setShowAddSongModal(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full dark:text-white"><Icon name="x" size={20}/></button>
                    </div>
                    <div className="overflow-y-auto space-y-2 flex-1 pr-1 custom-scrollbar">
                      {songs.map(s => (
                        <button key={s.id} onClick={async () => { if (!activePlaylist.songs?.includes(s.id)) { await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists', activePlaylist.id), { songs: [...(activePlaylist.songs || []), s.id] }); showToast("¡Agregada!"); } }} className={`w-full p-4 rounded-xl border-2 text-left flex justify-between items-center transition-all ${activePlaylist.songs?.includes(s.id) ? 'bg-green-50 border-green-200 dark:bg-green-900/20' : 'hover:bg-indigo-50 border-transparent dark:border-slate-800 shadow-sm'}`}>
                          <div className="overflow-hidden pr-2 text-left"><p className="font-bold truncate dark:text-white">{s.title}</p><p className="text-xs opacity-50 dark:text-slate-400 font-mono">{s.artist}</p></div>
                          {activePlaylist.songs?.includes(s.id) ? <Icon name="check" className="text-green-600" /> : <Icon name="plus" className="text-indigo-600" />}
                        </button>
                      ))}
                    </div>
                    <button onClick={()=>setShowAddSongModal(false)} className="w-full mt-4 py-4 bg-indigo-600 text-white rounded-xl font-bold">Terminar</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
