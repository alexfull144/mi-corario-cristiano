<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>My Corario - Master Pro</title>
    
    <!-- Librerías Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat (Carga Síncrona para evitar errores de referencia) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* DISEÑO MAESTRO NEUBRUTALISTA */
        .btn-master { transition: all 0.1s ease; box-shadow: 0 6px 0 #000; border: 4px solid #000; }
        .btn-master:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .btn-master:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #000; }

        .card-master { background: white; border: 4px solid #000; box-shadow: 8px 8px 0px 0px #000; transition: all 0.2s; }
        .card-master:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0px 0px #000; }

        .dark .card-master { background: #0f172a; border-color: #334155; box-shadow: 8px 8px 0px 0px #000; }

        /* RENDER DE ACORDES */
        .chord-row { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.2rem; }
        .chord-unit { display: flex; flex-direction: column; margin-right: 8px; }
        .chord-mark { font-weight: 900; color: #6366f1; line-height: 1; margin-bottom: 4px; }
        .lyric-mark { white-space: pre; font-weight: 700; line-height: 1.2; }

        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- INICIALIZACIÓN DE FIREBASE COMPAT ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        // Inicializamos una sola vez
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center ${className}`}></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [playlists, setPlaylists] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('list');
            const [activeTab, setActiveTab] = useState('songs');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [activeSongId, setActiveSongId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('google');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            const [toast, setToast] = useState(null);

            // Editor
            const [editTitle, setEditTitle] = useState('');
            const [editArtist, setEditArtist] = useState('');
            const [editLyrics, setEditLyrics] = useState('');
            const [editKey, setEditKey] = useState('');

            // Herramientas
            const [transposeSteps, setTransposeSteps] = useState(0);
            const [textSize, setTextSize] = useState(22);
            const [bpm, setBpm] = useState(120);
            const [isMetronomeOn, setIsMetronomeOn] = useState(false);
            const [isScrolling, setIsScrolling] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(2);

            const audioCtx = useRef(null);
            const appId = "corario-pro-final-v4";

            // --- AUTH LOGIC REPARADA ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const result = await auth.getRedirectResult();
                        if (result?.user) {
                            showToast("¡Sesión iniciada con Google!");
                        }
                    } catch (e) { 
                        console.error("Redirect error:", e); 
                    }

                    auth.onAuthStateChanged(async (u) => {
                        setUser(u);
                        if (!u) {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await auth.signInWithCustomToken(__initial_auth_token);
                                } else {
                                    await auth.signInAnonymously();
                                }
                            } catch (err) { 
                                console.warn("Fallback anónimo activado"); 
                            }
                        }
                        setLoading(false);
                    });
                };
                initAuth();
            }, []);

            // --- DATA SYNC REPARADA ---
            useEffect(() => {
                if (!user) return;
                
                const unsubS = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('songs')
                    .onSnapshot((snap) => {
                        setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, (err) => console.error("Error songs:", err));

                const unsubP = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('playlists')
                    .onSnapshot((snap) => {
                        setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, (err) => console.error("Error playlists:", err));

                return () => { unsubS(); unsubP(); };
            }, [user]);

            // --- TOOLS ---
            useEffect(() => {
                let timer;
                if (isMetronomeOn) {
                    timer = setInterval(() => {
                        if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtx.current.createOscillator();
                        const g = audioCtx.current.createGain();
                        osc.connect(g); g.connect(audioCtx.current.destination);
                        osc.frequency.value = 880;
                        g.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 0.05);
                        osc.start(); osc.stop(audioCtx.current.currentTime + 0.05);
                    }, 60000 / bpm);
                }
                return () => clearInterval(timer);
            }, [isMetronomeOn, bpm]);

            useEffect(() => {
                let sTimer;
                if (isScrolling) sTimer = setInterval(() => window.scrollBy(0, scrollSpeed), 50);
                return () => clearInterval(sTimer);
            }, [isScrolling, scrollSpeed]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleSaveSong = async () => {
                if (!editTitle) return showToast("El título es obligatorio");
                const data = { 
                    title: editTitle.toUpperCase(), 
                    artist: editArtist.toUpperCase() || "AUTOR DESCONOCIDO", 
                    musicalKey: editKey.toUpperCase() || "S/D", 
                    lyrics: editLyrics, 
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                try {
                    const songRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('songs');
                    if (activeSongId) await songRef.doc(activeSongId).update(data);
                    else await songRef.add(data);
                    setCurrentView('list');
                    showToast("¡Alabanza guardada!");
                } catch (e) { showToast("Error al guardar"); }
            };

            const handleEmailAuth = async (type) => {
                setAuthLoading(true);
                try {
                    if (type === 'login') await auth.signInWithEmailAndPassword(email, password);
                    else await auth.createUserWithEmailAndPassword(email, password);
                    setShowAuthModal(false);
                } catch (e) { showToast("Error: Revisa tus datos"); }
                setAuthLoading(false);
            };

            const transposeChord = (chord, steps) => {
                if (!chord || steps === 0) return chord;
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
                return chord.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                    let n = m.toUpperCase(); if (mapEs[n]) n = mapEs[n];
                    let idx = notes.indexOf(n.replace('B', '#'));
                    if (idx === -1) idx = notes.indexOf(n);
                    if (idx === -1) return m;
                    let newIdx = (idx + steps) % 12; if (newIdx < 0) newIdx += 12;
                    return notes[newIdx];
                });
            };

            const renderLyrics = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-6"></div>;
                    const parts = line.split(/(\[[^\]]+\])/g);
                    let segments = []; let lastChord = "";
                    parts.forEach(p => {
                        if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                        else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                    });
                    if (lastChord) segments.push({ chord: lastChord, text: "" });
                    return (
                        <div key={i} className="chord-row notranslate" translate="no">
                            {segments.map((seg, j) => (
                                <div key={j} className="chord-unit">
                                    <span className="chord-mark" style={{ fontSize: `${textSize * 0.7}px` }}>
                                        {seg.chord ? transposeChord(seg.chord, transposeSteps) : '\u00A0'}
                                    </span>
                                    <span className="lyric-mark" style={{ fontSize: `${textSize}px` }}>
                                        {seg.text || (seg.chord ? '\u00A0' : '')}
                                    </span>
                                </div>
                            ))}
                        </div>
                    );
                });
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black italic uppercase text-2xl animate-pulse">Cargando Corario...</div>;

            const activeSong = songs.find(s => s.id === activeSongId);

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white pb-32">
                        
                        {toast && <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full font-black z-[200] shadow-2xl animate-pop">{toast}</div>}

                        {/* HEADER */}
                        <header className="sticky top-0 z-50 bg-indigo-700 text-white p-4 shadow-xl flex justify-between items-center no-print">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setCurrentView('list'); setIsScrolling(false)}}>
                                <LucideIcon name="music" size={28} />
                                <h1 className="text-2xl font-black italic uppercase tracking-tighter">My Corario</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl">
                                    <LucideIcon name={isDarkMode ? "sun" : "moon"} size={20} />
                                </button>
                                {user && !user.isAnonymous ? (
                                    <div className="flex items-center gap-3">
                                        <div className="text-right hidden sm:block">
                                            <p className="text-[10px] font-black opacity-50 uppercase leading-none">Usuario</p>
                                            <p className="text-xs font-bold leading-tight">{user.email?.split('@')[0].toUpperCase() || "SIN EMAIL"}</p>
                                        </div>
                                        <button onClick={() => auth.signOut()} className="w-10 h-10 rounded-full border-2 border-white/20 overflow-hidden shadow-lg">
                                            <img src={user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${user.email || user.uid}`} className="w-full h-full object-cover" />
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAuthModal(true)} className="btn-master bg-white text-indigo-700 px-5 py-2 rounded-xl font-black text-xs uppercase">Entrar</button>
                                )}
                            </div>
                        </header>

                        <main className="max-w-4xl mx-auto p-4 md:p-8">
                            {currentView === 'list' && (
                                <div className="animate-pop">
                                    <div className="flex gap-2 p-1 bg-slate-200 dark:bg-slate-800 rounded-3xl mb-8 no-print">
                                        <button onClick={() => setActiveTab('songs')} className={`flex-1 py-4 rounded-2xl font-black transition-all ${activeTab === 'songs' ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-500'}`}>ALABANZAS</button>
                                        <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-4 rounded-2xl font-black transition-all ${activeTab === 'playlists' ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-500'}`}>CULTOS</button>
                                    </div>

                                    <div className="flex gap-3 mb-10 no-print">
                                        <div className="relative flex-1">
                                            <LucideIcon name="search" className="absolute left-4 top-4 opacity-40" />
                                            <input type="text" placeholder="BUSCAR..." className="w-full p-4 pl-12 rounded-3xl border-4 border-black dark:border-slate-800 bg-white dark:bg-slate-900 font-black text-xl outline-none shadow-[4px_4px_0px_0px_#000]" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                        </div>
                                        <button onClick={() => {setEditTitle(''); setEditArtist(''); setEditLyrics(''); setEditKey(''); setActiveSongId(null); setCurrentView('edit')}} className="bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-xl btn-master"><LucideIcon name="plus" size={32}/></button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {activeTab === 'songs' ? (
                                            songs.filter(s => (s.title||'').toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                                <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view')}} className="card-master p-6 cursor-pointer group">
                                                    <h3 className="font-black text-2xl uppercase italic group-hover:text-indigo-600 truncate">{s.title}</h3>
                                                    <p className="text-sm font-bold opacity-40 mt-1 uppercase tracking-widest">{s.artist} • [{s.musicalKey}]</p>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="col-span-full py-20 text-center opacity-30 italic font-black uppercase">No hay cultos creados aún</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {currentView === 'edit' && (
                                <div className="animate-pop pb-20">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-3xl font-black uppercase italic">Editor</h2>
                                        <button onClick={() => setCurrentView('list')} className="text-slate-500 font-bold uppercase text-xs">Cerrar</button>
                                    </div>
                                    <div className="space-y-6">
                                        <input type="text" placeholder="TÍTULO..." className="w-full p-4 rounded-2xl border-4 border-black dark:border-slate-800 font-black text-xl uppercase dark:bg-slate-900" value={editTitle} onChange={e=>setEditTitle(e.target.value)} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="text" placeholder="ARTISTA..." className="w-full p-4 rounded-2xl border-4 border-black dark:border-slate-800 font-bold uppercase dark:bg-slate-900" value={editArtist} onChange={e=>setEditArtist(e.target.value)} />
                                            <input type="text" placeholder="TONO (G)..." className="w-full p-4 rounded-2xl border-4 border-black dark:border-slate-800 font-bold uppercase dark:bg-slate-900" value={editKey} onChange={e=>setEditKey(e.target.value)} />
                                        </div>
                                        <textarea placeholder="Pega la letra con acordes entre corchetes, ejemplo: [Do] Santo..." className="w-full h-96 p-6 rounded-[40px] border-4 border-black dark:border-slate-800 font-mono text-lg dark:bg-slate-900 outline-none" value={editLyrics} onChange={e=>setEditLyrics(e.target.value)} />
                                        <button onClick={handleSaveSong} className="w-full py-6 bg-indigo-600 text-white rounded-[40px] btn-master font-black text-2xl uppercase shadow-[0_8px_0_#1e1b4b]">GUARDAR ALABANZA</button>
                                    </div>
                                </div>
                            )}

                            {currentView === 'view' && activeSong && (
                                <div className="animate-pop pb-40">
                                    <div className="flex justify-between items-center mb-8 no-print">
                                        <button onClick={() => {setCurrentView('list'); setIsScrolling(false)}} className="text-indigo-600 font-black flex items-center gap-2 uppercase text-sm"><LucideIcon name="chevron-left" /> VOLVER</button>
                                        <div className="flex gap-2">
                                            <button onClick={()=>{setEditTitle(activeSong.title); setEditArtist(activeSong.artist); setEditLyrics(activeSong.lyrics); setEditKey(activeSong.musicalKey); setCurrentView('edit')}} className="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl"><LucideIcon name="edit-2" size={20}/></button>
                                        </div>
                                    </div>
                                    
                                    <h2 className="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none mb-4">{activeSong.title}</h2>
                                    <p className="text-2xl opacity-40 font-black uppercase tracking-widest mb-10">{activeSong.artist}</p>

                                    <div className="flex flex-wrap gap-4 mb-12 no-print">
                                        <div className="flex items-center bg-white dark:bg-slate-900 border-4 border-black p-1 rounded-2xl shadow-[4px_4px_0px_0px_#000]">
                                            <button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s - 1)}>-</button>
                                            <span className="px-4 font-black text-indigo-600 uppercase text-xs">
                                                {transposeSteps === 0 ? 'Original' : (transposeSteps > 0 ? `+${transposeSteps}` : transposeSteps)}
                                            </span>
                                            <button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s + 1)}>+</button>
                                        </div>
                                        <div className="flex items-center bg-white dark:bg-slate-900 border-4 border-black p-1 rounded-2xl shadow-[4px_4px_0px_0px_#000]">
                                            <span className="px-4 font-black text-teal-600 uppercase text-xs">{bpm} BPM</span>
                                            <button onClick={() => setIsMetronomeOn(!isMetronomeOn)} className={`w-10 h-10 flex items-center justify-center rounded-xl text-white ${isMetronomeOn ? 'bg-red-500' : 'bg-teal-500'}`}>
                                                <LucideIcon name={isMetronomeOn ? "pause" : "play"} size={16} />
                                            </button>
                                        </div>
                                        <button onClick={() => window.print()} className="bg-slate-900 text-white p-4 rounded-2xl btn-master">
                                            <LucideIcon name="printer" size={20} />
                                        </button>
                                    </div>

                                    <div className="pb-40 font-bold leading-relaxed">{renderLyrics(activeSong.lyrics)}</div>

                                    {/* BOTÓN SCROLL FLOTANTE */}
                                    <div className="fixed bottom-8 right-8 flex items-center gap-3 p-3 bg-white/90 dark:bg-slate-800/90 backdrop-blur rounded-full border-4 border-black shadow-2xl z-50 no-print">
                                        {isScrolling && (
                                            <div className="flex items-center pr-2 border-r-2 border-slate-300 mr-2">
                                                <button className="p-2" onClick={() => setScrollSpeed(s => Math.max(1, s-1))}><LucideIcon name="rewind" size={18}/></button>
                                                <span className="font-black text-indigo-600 px-1 text-xs">{scrollSpeed}x</span>
                                                <button className="p-2" onClick={() => setScrollSpeed(s => Math.min(10, s+1))}><LucideIcon name="fast-forward" size={18}/></button>
                                            </div>
                                        )}
                                        <button onClick={() => setIsScrolling(!isScrolling)} className={`p-6 rounded-full text-white shadow-xl ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'}`}>
                                            {isScrolling ? <LucideIcon name="pause" size={32} /> : <LucideIcon name="play" size={32} />}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* MODAL AUTH COMPLETO */}
                        {showAuthModal && (
                            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[1000] text-center backdrop-blur-sm">
                                <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[56px] p-10 border-[12px] border-indigo-600/10 shadow-2xl relative animate-pop">
                                    <button onClick={()=>setShowAuthModal(false)} className="absolute top-8 right-8 opacity-30"><LucideIcon name="x" size={32}/></button>
                                    <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-8">Entrar a My Corario</h3>
                                    
                                    {authMode === 'google' ? (
                                        <>
                                            <button 
                                                onClick={async () => {
                                                    setAuthLoading(true);
                                                    try { await auth.signInWithRedirect(googleProvider); } catch(e) { setAuthLoading(false); }
                                                }} 
                                                className="w-full py-6 bg-white dark:bg-slate-800 border-4 border-black rounded-3xl font-black text-sm flex items-center justify-center gap-4 shadow-[6px_6px_0px_0px_#000] active:translate-y-1 active:shadow-none transition-all mb-8"
                                            >
                                                {authLoading ? <LucideIcon name="loader-2" className="animate-spin" /> : <img src="https://www.google.com/favicon.ico" className="w-8 h-8" />} 
                                                CONTINUAR CON GOOGLE
                                            </button>
                                            <button onClick={() => setAuthMode('email')} className="text-xs font-black uppercase opacity-40 hover:opacity-100">O usar correo electrónico</button>
                                        </>
                                    ) : (
                                        <div className="space-y-4">
                                            <input type="email" placeholder="CORREO@EMAIL.COM" className="w-full p-4 rounded-2xl border-4 border-black dark:bg-slate-800 font-bold uppercase outline-none" value={email} onChange={e=>setEmail(e.target.value)} />
                                            <input type="password" placeholder="CONTRASEÑA" className="w-full p-4 rounded-2xl border-4 border-black dark:bg-slate-800 font-bold uppercase outline-none" value={password} onChange={e=>setPassword(e.target.value)} />
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEmailAuth('login')} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black btn-master">ENTRAR</button>
                                                <button onClick={() => handleEmailAuth('register')} className="flex-1 py-4 bg-white dark:bg-slate-800 border-4 border-black rounded-2xl font-black">CREAR</button>
                                            </div>
                                            <button onClick={() => setAuthMode('google')} className="block w-full text-xs font-black uppercase opacity-40 pt-4">Volver a Google</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
