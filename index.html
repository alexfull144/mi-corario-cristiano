<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Corario AI - Ministerio Musical</title>
    <!-- Librerías de Producción (React, Tailwind, Lucide, Babel) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .notranslate { translate: no !important; }

        @media print {
            .print\:hidden { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; }
            .song-page { page-break-after: always; padding: 1.5cm 0; border-bottom: 2px solid #eee; }
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }

        /* Renderizado Maestro: Acorde exactamente sobre la sílaba */
        .chord-segment {
            display: inline-flex;
            flex-direction: column;
            vertical-align: bottom;
            min-width: 1ch;
        }
        .chord-visual {
            height: 1.4em;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
            margin-bottom: 0.1em;
            display: block;
            user-select: none;
        }
        .text-visual {
            line-height: 1.2;
            white-space: pre;
            display: block;
        }
        .lyric-line {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 0.9rem;
            min-height: 2.5em;
            align-items: flex-end;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 notranslate" translate="no">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE (TU CÓDIGO)
        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "corario-pro-v21";

        window.FB_INSTANCE = { auth, db, appId, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Componente Icono
        const Icon = ({ name, size = 24, className = "", spin = false }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { 
                            class: `${className} ${spin ? 'animate-spin' : ''}`, 
                            style: `width: ${size}px; height: ${size}px;` 
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className, spin]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
          const fb = window.FB_INSTANCE;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [loading, setLoading] = useState(true);
          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [activeSongId, setActiveSongId] = useState(null);
          const [activePlaylistId, setActivePlaylistId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [playlistMode, setPlaylistMode] = useState('list');
          
          // Estilos
          const [textSize, setTextSize] = useState(18);
          const [chordColor, setChordColor] = useState('default');
          const [lyricColor, setLyricColor] = useState('default');
          const [showStylePanel, setShowStylePanel] = useState(false);
          const [transposeSteps, setTransposeSteps] = useState(0);

          // Herramientas
          const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
          const [bpm, setBpm] = useState(120);
          const [isScrolling, setIsScrolling] = useState(false);
          const [scrollSpeed, setScrollSpeed] = useState(2);

          // Editor
          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editKey, setEditKey] = useState('');
          const [editLyrics, setEditLyrics] = useState('');

          const [isAiLoading, setIsAiLoading] = useState(false);
          const [toast, setToast] = useState(null);
          const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
          const [newPlaylistName, setNewPlaylistName] = useState('');
          const [showAddSongModal, setShowAddSongModal] = useState(false);

          const audioCtxRef = useRef(null);
          const metronomeIntervalRef = useRef(null);

          // Auth
          useEffect(() => {
            fb.signInAnonymously(fb.auth).catch(e => console.error(e));
            const unsub = fb.onAuthStateChanged(fb.auth, (u) => {
              setUser(u);
              setLoading(false);
            });
            return () => unsub();
          }, []);

          // Data
          useEffect(() => {
            if (!user) return;
            const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs'), (snap) => {
              setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'playlists'), (snap) => {
              setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            return () => { unsubS(); unsubP(); };
          }, [user]);

          // Metrónomo
          useEffect(() => {
            if (isMetronomePlaying) {
              metronomeIntervalRef.current = setInterval(() => {
                if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtxRef.current.createOscillator();
                const gain = audioCtxRef.current.createGain();
                osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                osc.frequency.value = 1000;
                gain.gain.setValueAtTime(0.2, audioCtxRef.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05);
                osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
              }, 60000 / bpm);
            } else { clearInterval(metronomeIntervalRef.current); }
            return () => clearInterval(metronomeIntervalRef.current);
          }, [isMetronomePlaying, bpm]);

          // Scroll
          useEffect(() => {
            if (isScrolling) {
              const interval = setInterval(() => window.scrollBy(0, scrollSpeed), 50);
              return () => clearInterval(interval);
            }
          }, [isScrolling, scrollSpeed]);

          const transposeChord = (chordStr, steps) => {
            if (!chordStr || steps === 0) return chordStr;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
            return chordStr.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
              let note = m.toUpperCase();
              if (mapEs[note]) note = mapEs[note];
              let idx = notes.indexOf(note);
              if (idx === -1) return m;
              let newIdx = (idx + steps) % 12;
              if (newIdx < 0) newIdx += 12;
              return notes[newIdx];
            });
          };

          const chordColorMap = { 'default': '#6366f1', 'red': '#ef4444', 'teal': '#14b8a6', 'violet': '#8b5cf6', 'orange': '#f97316' };
          const lyricColorMap = { 'default': isDarkMode ? '#f8fafc' : '#0f172a', 'blue': '#2563eb', 'emerald': '#059669', 'rose': '#e11d48', 'amber': '#d97706' };

          const renderLyrics = (text, steps = transposeSteps) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
              if (!line.trim()) return <div key={i} className="h-6"></div>;
              const parts = line.split(/(\[[^\]]+\])/g);
              let segments = [];
              let lastChord = "";
              parts.forEach(p => {
                if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
              });
              if (lastChord) segments.push({ chord: lastChord, text: "" });

              return (
                <div key={i} className="lyric-line notranslate" translate="no">
                  {segments.map((seg, j) => (
                    <div key={j} className="chord-segment notranslate" translate="no">
                      <span className="chord-visual font-mono notranslate" translate="no" style={{ color: chordColorMap[chordColor], fontSize: `${textSize * 0.75}px` }}>
                        {seg.chord ? transposeChord(seg.chord, steps) : '\u00A0'}
                      </span>
                      <span className="text-visual notranslate" translate="no" style={{ color: lyricColorMap[lyricColor], fontSize: `${textSize}px` }}>
                        {seg.text || (seg.chord ? '\u00A0' : '')}
                      </span>
                    </div>
                  ))}
                </div>
              );
            });
          };

          const handleIA = async () => {
            if (!editLyrics) return;
            setIsAiLoading(true);
            const apiKey = "AIzaSyB8eQAgc68ME2eS0pq5WW1fEVwZ3shKaUQ"; // TU CLAVE INTEGRADA
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: editLyrics }] }],
                  systemInstruction: { parts: [{ text: "Actúa como músico experto. Re-armoniza con acordes avanzados entre corchetes [Acorde]. Cifrado Americano. Devuelve SOLO el texto rearmonizado." }] }
                })
              });
              const data = await res.json();
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) setEditLyrics(text.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim());
            } catch (e) { showToast("Error IA", "error"); }
            setIsAiLoading(false);
          };

          const formatInternetChords = () => {
            if (!editLyrics) return;
            const lines = editLyrics.split('\n');
            let newLyrics = [];
            const isChord = (w) => /^[A-G][#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i.test(w);
            for (let i = 0; i < lines.length; i++) {
                const current = lines[i]; const next = lines[i+1];
                const words = current.trim().split(/\s+/);
                if (words.length > 0 && words.every(w => isChord(w)) && next) {
                    let merged = next.split(''); let offset = 0;
                    const regex = /([^\s]+)/g; let m;
                    while ((m = regex.exec(current)) !== null) {
                        const tag = `[${m[0]}]`;
                        merged.splice(Math.min(m.index, merged.length) + offset, 0, tag);
                        offset += tag.length;
                    }
                    newLyrics.push(merged.join('')); i++;
                } else { newLyrics.push(current); }
            }
            setEditLyrics(newLyrics.join('\n'));
          };

          const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

          const filteredSongs = songs.filter(s => s.title.toLowerCase().includes(searchQuery.toLowerCase()) || (s.artist && s.artist.toLowerCase().includes(searchQuery.toLowerCase())));

          if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black animate-pulse">CORARIO AI...</div>;

          return (
            <div className={`min-h-screen transition-all ${isDarkMode ? 'dark bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
              
              {toast && <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] animate-bounce ${toast.type === 'error' ? 'bg-red-600' : 'bg-indigo-600'} text-white`}>{toast.message}</div>}

              <header className="sticky top-0 z-50 bg-indigo-700 dark:bg-indigo-900 text-white p-4 flex justify-between items-center shadow-lg print:hidden">
                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('list')}><Icon name="music" size={24} /><h1 className="text-xl font-black italic uppercase">Corario AI</h1></div>
                <div className="flex items-center gap-4">
                  <button onClick={() => setIsDarkMode(!isDarkMode)}><Icon name={isDarkMode ? "sun" : "moon"} /></button>
                  {currentView === 'list' && <button className="bg-white text-indigo-700 px-4 py-1.5 rounded-full font-bold text-sm shadow-md" onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setCurrentView('edit'); }}>+ Nueva</button>}
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 md:p-8">
                {currentView === 'list' && (
                  <div className="animate-in">
                    <div className="flex gap-2 p-1 bg-slate-200 dark:bg-slate-800 rounded-2xl mb-8">
                        <button onClick={() => setActiveTab('songs')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab === 'songs' ? 'bg-white text-indigo-600' : 'text-slate-500'}`}>Alabanzas</button>
                        <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab === 'playlists' ? 'bg-white text-indigo-600' : 'text-slate-500'}`}>Cultos</button>
                    </div>
                    <div className="relative mb-8"><Icon name="search" className="absolute left-4 top-3.5 opacity-30" size={20} /><input type="text" placeholder="Buscar..." className="w-full pl-12 pr-4 py-3.5 rounded-2xl border-2 dark:bg-slate-900 border-transparent focus:border-indigo-500 outline-none shadow-sm dark:text-white" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {activeTab === 'songs' ? filteredSongs.map(s => (
                            <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view')}} className="p-5 bg-white dark:bg-slate-900 rounded-3xl border-2 hover:border-indigo-500 cursor-pointer flex justify-between items-center shadow-sm">
                                <div><h3 className="font-bold text-lg">{s.title}</h3><p className="text-xs opacity-50 uppercase">{s.artist} • [{s.musicalKey}]</p></div>
                                <Icon name="chevron-right" className="opacity-20" />
                            </div>
                        )) : <>
                            <button onClick={() => setShowNewPlaylistModal(true)} className="p-8 border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl text-slate-400 font-bold">+ Nuevo Culto</button>
                            {playlists.map(p => (
                                <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView')}} className="p-6 bg-white dark:bg-slate-900 rounded-3xl border-2 hover:border-indigo-500 cursor-pointer shadow-sm">
                                    <h3 className="font-black text-xl"><Icon name="list-music" className="text-indigo-500 mr-2" /> {p.name}</h3>
                                    <p className="text-sm opacity-50">{p.songs?.length || 0} canciones</p>
                                </div>
                            ))}
                        </>}
                    </div>
                  </div>
                )}

                {currentView === 'view' && songs.find(s => s.id === activeSongId) && (
                  <div className="animate-in pb-32">
                    <div className="flex justify-between items-center mb-8 print:hidden">
                      <button className="flex items-center gap-2 text-indigo-600 font-bold" onClick={() => setCurrentView('list')}><Icon name="chevron-left" size={18} /> Volver</button>
                      <div className="flex gap-2">
                        <button className="p-3 bg-indigo-100 text-indigo-700 rounded-2xl" onClick={() => setShowStylePanel(!showStylePanel)}><Icon name="palette" size={20}/></button>
                        <button className="p-3 bg-slate-800 text-white rounded-2xl" onClick={() => window.print()}><Icon name="printer" size={20}/></button>
                      </div>
                    </div>

                    {showStylePanel && (
                        <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border-2 shadow-xl mb-8 print:hidden animate-in">
                            <div className="grid grid-cols-2 gap-6">
                                <div><label className="text-xs font-black uppercase text-slate-400 block mb-3">Color Acordes</label><div className="flex gap-2">{Object.keys(chordColorMap).map(c => (<button key={c} onClick={()=>setChordColor(c)} className={`w-8 h-8 rounded-full border-2 ${chordColor===c?'border-black dark:border-white scale-110':'border-transparent'}`} style={{backgroundColor: chordColorMap[c]}}></button>))}</div></div>
                                <div><label className="text-xs font-black uppercase text-slate-400 block mb-3">Color Letra</label><div className="flex gap-2">{Object.keys(lyricColorMap).map(c => (<button key={c} onClick={()=>setLyricColor(c)} className={`w-8 h-8 rounded-full border-2 ${lyricColor===c?'border-black dark:border-white scale-110':'border-transparent'}`} style={{backgroundColor: lyricColorMap[c]}}></button>))}</div></div>
                            </div>
                        </div>
                    )}

                    <div className="mb-10"><h2 className="text-5xl font-black mb-2 leading-tight">{songs.find(s => s.id === activeSongId).title}</h2><p className="text-xl opacity-60 italic mb-6">{songs.find(s => s.id === activeSongId).artist}</p>
                      <div className="flex flex-wrap gap-4 print:hidden items-center">
                        <div className="flex items-center bg-white dark:bg-slate-900 rounded-2xl border-2 p-1"><button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s - 1)}>-</button><span className="px-4 text-indigo-600 font-black min-w-[80px] text-center">{transposeSteps === 0 ? 'Tono' : transposeSteps}</span><button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s + 1)}>+</button></div>
                        <div className="flex items-center bg-white dark:bg-slate-900 rounded-2xl border-2 p-1"><button className="px-3" onClick={() => setBpm(b => Math.max(40, b - 5))}>-</button><span className="font-bold text-xs w-16 text-center">{bpm} BPM</span><button className="px-3" onClick={() => setBpm(b => Math.min(240, b + 5))}>+</button><button className={`ml-2 p-2 rounded-xl ${isMetronomePlaying?'bg-red-500':'bg-teal-500'} text-white shadow-md`} onClick={() => setIsMetronomePlaying(!isMetronomePlaying)}><Icon name={isMetronomePlaying ? "pause" : "play"} size={16}/></button></div>
                      </div>
                    </div>
                    <div className="space-y-1 pb-20">{renderLyrics(songs.find(s => s.id === activeSongId).lyrics)}</div>
                  </div>
                )}

                {currentView === 'edit' && (
                  <div className="animate-in pb-20">
                    <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black dark:text-white">Editor</h2><div className="flex gap-2"><button onClick={() => setCurrentView('list')} className="px-4 py-2 font-bold opacity-50 dark:text-white">Cerrar</button><button onClick={handleIA} className="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-bold flex items-center gap-2" disabled={isAiLoading}>{isAiLoading ? <Icon name="loader-2" spin /> : <Icon name="sparkles" size={18} />} Rearmonizar IA</button></div></div>
                    <div className="space-y-4">
                        <input type="text" placeholder="Título..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white outline-none focus:border-indigo-500 text-xl font-bold" value={editTitle} onChange={e => setEditTitle(e.target.value)} />
                        <div className="grid grid-cols-2 gap-4"><input type="text" placeholder="Artista..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white" value={editArtist} onChange={e => setEditArtist(e.target.value)} /><input type="text" placeholder="Tono..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 dark:text-white" value={editKey} onChange={e => setEditKey(e.target.value)} /></div>
                        <button onClick={formatInternetChords} className="w-full py-4 bg-indigo-50 text-indigo-700 rounded-2xl font-bold flex items-center justify-center gap-2 border-2 border-indigo-100"><Icon name="wand-2" /> Vincular Acordes Automáticamente</button>
                        <textarea placeholder="Letra con [Do]..." className="w-full h-96 p-6 rounded-3xl border-2 dark:bg-slate-900 dark:text-white font-mono text-sm leading-relaxed" value={editLyrics} onChange={e => setEditLyrics(e.target.value)} />
                        <button className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl active:scale-95" onClick={async () => {
                            await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs'), { title: editTitle, artist: editArtist, musicalKey: editKey, lyrics: editLyrics, updatedAt: Date.now() });
                            setCurrentView('list'); showToast("¡Guardada!");
                        }}>GUARDAR ALABANZA</button>
                    </div>
                  </div>
                )}
              </main>

              {(currentView === 'view' || currentView === 'playlistView') && (
                <div className="fixed bottom-8 right-8 flex items-center gap-3 p-3 bg-white/90 dark:bg-slate-800/90 rounded-full shadow-2xl border-2 print:hidden z-[100]">
                  {isScrolling && <div className="flex items-center gap-2 pr-2 animate-in"><button className="p-3 bg-slate-100 dark:bg-slate-700 rounded-full" onClick={() => setScrollSpeed(s => Math.max(1, s-1))}><Icon name="rewind" size={18}/></button><span className="font-black text-indigo-600 px-1 text-sm">{scrollSpeed}x</span><button className="p-3 bg-slate-100 dark:bg-slate-700 rounded-full" onClick={() => setScrollSpeed(s => Math.min(10, s+1))}><Icon name="fast-forward" size={18}/></button></div>}
                  <button onClick={() => setIsScrolling(!isScrolling)} className={`p-6 rounded-full text-white shadow-xl transition-all ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'}`}><Icon name={isScrolling ? "pause" : "play"} size={32} /></button>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
