<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corario AI - Ministerio Musical</title>
    <!-- Librerías desde la nube (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons Core -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&family=JetBrains+Mono&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        @media print {
            .print\:hidden { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; }
            .song-page { page-break-after: always; padding: 1.5cm 0; border-bottom: 2px solid #eee; }
            h2, h3 { color: black !important; }
            @page { margin: 1.5cm; size: auto; }
        }

        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- SDK de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "AIzaSyDemo", authDomain: "demo.firebaseapp.com", projectId: "demo", storageBucket: "demo.appspot.com", messagingSenderId: "0", appId: "0" };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.FB = { auth, db, appId, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, signInAnonymously, onAuthStateChanged };
    </script>

    <!-- Lógica de la Aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        function App() {
          const fb = window.FB;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [activeSongId, setActiveSongId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [fontFamily, setFontFamily] = useState('font-sans');
          const [lyricColor, setLyricColor] = useState('default');
          const [chordColor, setChordColor] = useState('default');
          const [showStylePanel, setShowStylePanel] = useState(false);
          const [isScrolling, setIsScrolling] = useState(false);
          const [scrollSpeed, setScrollSpeed] = useState(2);
          const [bpm, setBpm] = useState(120);
          const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
          const [transposeSteps, setTransposeSteps] = useState(0);
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [toast, setToast] = useState(null);
          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editKey, setEditKey] = useState('');
          const [editLyrics, setEditLyrics] = useState('');

          const audioCtxRef = useRef(null);
          const metronomeIntervalRef = useRef(null);

          useEffect(() => {
            if (!fb) return;
            fb.onAuthStateChanged(fb.auth, (u) => {
              if (!u) fb.signInAnonymously(fb.auth);
              setUser(u);
            });
          }, [fb]);

          useEffect(() => {
            if (!user || !fb) return;
            const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs'), (s) => {
              setSongs(s.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            return () => unsubS();
          }, [user, fb]);

          const transposeChord = (chordStr, steps) => {
            if (!chordStr || steps === 0) return chordStr;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const esNotes = ['Do', 'Do#', 'Re', 'Re#', 'Mi', 'Fa', 'Fa#', 'Sol', 'Sol#', 'La', 'La#', 'Si'];
            const map = { 'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#', 'Reb':'Do#', 'Mib':'Re#', 'Solb':'Fa#', 'Lab':'Sol#', 'Sib':'La#' };
            return chordStr.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
              let note = m.charAt(0).toUpperCase() + m.slice(1).toLowerCase();
              if (map[note]) note = map[note];
              let idx = notes.indexOf(note);
              let isEs = false;
              if (idx === -1) { idx = esNotes.indexOf(note); isEs = true; }
              if (idx === -1) return m;
              let newIdx = (idx + steps) % 12;
              if (newIdx < 0) newIdx += 12;
              return isEs ? esNotes[newIdx] : notes[newIdx];
            });
          };

          const chordStyleMap = { 'default': '#4f46e5', 'red': '#dc2626', 'teal': '#0d9488', 'violet': '#7c3aed', 'orange': '#ea580c' };
          const lyricStyleMap = { 'default': isDarkMode ? '#f1f5f9' : '#1e293b', 'blue': '#2563eb', 'emerald': '#10b981', 'rose': '#f43f5e', 'amber': '#f59e0b' };

          const renderLyrics = (text, steps = transposeSteps) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => (
              <div key={i} className={`flex flex-wrap items-end mb-1 ${fontFamily}`}>
                {line.split(/(\[[^\]]+\])/g).map((part, j) => {
                  if (part.startsWith('[') && part.endsWith(']')) {
                    return (
                      <div key={j} className="flex flex-col mr-1">
                        <span className="font-bold block -mb-1" style={{ fontSize: '14px', color: chordStyleMap[chordColor] }}>
                          {transposeChord(part.slice(1, -1), steps)}
                        </span>
                      </div>
                    );
                  }
                  return <span key={j} className="whitespace-pre leading-relaxed" style={{ fontSize: '18px', color: lyricStyleMap[lyricColor] }}>{part}</span>;
                })}
              </div>
            ));
          };

          const handleSave = async () => {
            if (!editTitle) return showToast("Falta el título");
            try {
              const data = { title: editTitle, artist: editArtist, musicalKey: editKey, lyrics: editLyrics, updatedAt: Date.now() };
              await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'songs'), data);
              setCurrentView('list');
              showToast("¡Guardado con éxito!");
            } catch (e) { showToast("Error al guardar"); }
          };

          const handleRearmonizar = async () => {
            if (!editLyrics) return;
            setIsAiLoading(true);
            const apiKey = "gen-lang-client-0332007452";
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Actúa como músico experto. Re-armoniza esta canción con acordes avanzados entre corchetes [Acorde]. Solo devuelve la letra con los nuevos acordes. Letra: ${editLyrics}` }] }] })
              });
              const data = await response.json();
              const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (result) setEditLyrics(result.replace(/```/g, '').trim());
              showToast("¡Rearmonización lista!");
            } catch (e) { showToast("Error de IA"); } finally { setIsAiLoading(false); }
          };

          const vincularAcordes = () => {
            // Detecta acordes en líneas superiores y los mete en la letra
            const lines = editLyrics.split('\n');
            let result = [];
            const isChordLine = (l) => l.trim().length > 0 && l.split(/\s+/).every(w => /^[A-G][#b]?(m|maj|min|dim|aug|sus|add|[0-9])*$/i.test(w) || /^(Do|Re|Mi|Fa|Sol|La|Si)[#b]?(m|maj|min|dim|aug|sus|add|[0-9])*$/i.test(w));
            
            for (let i = 0; i < lines.length; i++) {
              if (i < lines.length - 1 && isChordLine(lines[i]) && !isChordLine(lines[i+1])) {
                let chords = lines[i];
                let text = lines[i+1];
                let merged = text;
                // Lógica simple de inserción (esto es un prototipo, el usuario puede ajustarlo)
                result.push(chords.split(/\s+/).filter(c => c).map(c => `[${c}]`).join(' ') + " " + text);
                i++;
              } else { result.push(lines[i]); }
            }
            setEditLyrics(result.join('\n'));
            showToast("Acordes vinculados");
          };

          const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

          const activeSong = songs.find(s => s.id === activeSongId);

          return (
            <div className={`min-h-screen ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'} pb-24`}>
              {toast && <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl z-[100] animate-bounce">{toast}</div>}

              <header className="sticky top-0 z-50 bg-indigo-700 text-white p-4 flex justify-between items-center shadow-lg print:hidden">
                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('list')}>
                  <Icon name="music" size={24} />
                  <h1 className="text-xl font-black italic uppercase">Corario AI</h1>
                </div>
                <div className="flex items-center gap-4">
                  <button onClick={() => setIsDarkMode(!isDarkMode)}><Icon name={isDarkMode ? "sun" : "moon"} size={20} /></button>
                  {currentView === 'list' && <button className="bg-white text-indigo-700 px-4 py-1.5 rounded-full font-bold text-sm shadow-md" onClick={() => { setEditTitle(''); setEditArtist(''); setEditLyrics(''); setEditKey(''); setCurrentView('edit'); }}>+ Nueva</button>}
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 md:p-8">
                {currentView === 'list' && (
                  <div className="animate-in">
                    <div className="relative mb-8">
                      <div className="absolute left-4 top-3.5 opacity-30"><Icon name="search" size={20} /></div>
                      <input type="text" placeholder="Buscar por título, tono o artista..." className="w-full pl-12 pr-4 py-3.5 rounded-2xl border-2 dark:bg-slate-900 border-transparent focus:border-indigo-500 outline-none shadow-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {songs.filter(s => s.title.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                        <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view')}} className="p-5 bg-white dark:bg-slate-900 rounded-3xl border-2 hover:border-indigo-500 cursor-pointer flex justify-between items-center shadow-sm group">
                          <div><h3 className="font-bold text-lg">{s.title}</h3><p className="text-xs opacity-50 uppercase">{s.artist} • [{s.musicalKey}]</p></div>
                          <Icon name="chevron-right" className="opacity-20 group-hover:opacity-100" size={20} />
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {currentView === 'view' && activeSong && (
                  <div className="animate-in">
                    <div className="flex justify-between items-center mb-8 print:hidden">
                      <button className="flex items-center gap-2 text-indigo-600 font-bold" onClick={() => setCurrentView('list')}><Icon name="chevron-left" size={18} /> Volver</button>
                      <div className="flex gap-2">
                        <button className="p-3 bg-indigo-100 text-indigo-700 rounded-2xl" onClick={() => setShowStylePanel(!showStylePanel)}><Icon name="palette" size={20}/></button>
                        <button className="p-3 bg-slate-800 text-white rounded-2xl" onClick={() => window.print()}><Icon name="printer" size={20}/></button>
                      </div>
                    </div>

                    <div className="mb-10">
                      <h2 className="text-5xl font-black mb-2">{activeSong.title}</h2>
                      <p className="text-xl opacity-60 italic mb-6">{activeSong.artist}</p>
                      <div className="flex items-center gap-4 print:hidden">
                        <div className="flex items-center bg-white dark:bg-slate-800 rounded-2xl border-2 p-1">
                          <button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s - 1)}>-</button>
                          <span className="px-4 text-indigo-600 font-black min-w-[80px] text-center">{transposeSteps !== 0 ? (transposeSteps > 0 ? `+${transposeSteps}` : transposeSteps) : 'Original'}</span>
                          <button className="w-10 h-10 font-black" onClick={() => setTransposeSteps(s => s + 1)}>+</button>
                        </div>
                        <button onClick={() => setIsScrolling(!isScrolling)} className={`p-4 rounded-full ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'} text-white shadow-xl`}><Icon name={isScrolling ? "pause" : "play"} size={24}/></button>
                      </div>
                    </div>
                    <div className="space-y-1">{renderLyrics(activeSong.lyrics)}</div>
                  </div>
                )}

                {currentView === 'edit' && (
                  <div className="animate-in">
                    <div className="flex justify-between items-center mb-8">
                      <h2 className="text-3xl font-black">Nueva Alabanza</h2>
                      <div className="flex gap-2">
                        <button onClick={() => setCurrentView('list')} className="px-4 py-2 font-bold opacity-50">Cerrar</button>
                        <button onClick={handleRearmonizar} className="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-xl font-bold flex items-center gap-2" disabled={isAiLoading}>
                          {isAiLoading ? <Icon name="loader-2" className="animate-spin" size={18}/> : <Icon name="sparkles" size={18} />} IA Rearmonizar
                        </button>
                      </div>
                    </div>
                    <div className="space-y-4">
                      <input type="text" placeholder="Título..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 outline-none focus:border-indigo-500 text-xl font-bold" value={editTitle} onChange={e => setEditTitle(e.target.value)} />
                      <div className="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="Artista..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 outline-none focus:border-indigo-500 font-bold" value={editArtist} onChange={e => setEditArtist(e.target.value)} />
                        <input type="text" placeholder="Tono..." className="w-full p-4 rounded-2xl border-2 dark:bg-slate-900 outline-none focus:border-indigo-500 font-bold" value={editKey} onChange={e => setEditKey(e.target.value)} />
                      </div>
                      <button onClick={vincularAcordes} className="w-full py-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold border-2 border-indigo-100 italic">Paso 1: Vincular Acordes Automáticamente</button>
                      <textarea placeholder="Pega letra con acordes aquí..." className="w-full h-80 p-6 rounded-3xl border-2 dark:bg-slate-900 outline-none font-mono text-sm" value={editLyrics} onChange={e => setEditLyrics(e.target.value)} />
                      <button className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl hover:bg-indigo-700" onClick={handleSave}>GUARDAR ALABANZA</button>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
