<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Corario App - Ministerio Musical</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&display=swap');
        
        :root { --indigo-primary: #4338ca; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            margin: 0; 
            min-height: 100vh;
        }

        .notranslate { translate: no !important; }

        /* --- BOTONES 3D DE ALTA VISIBILIDAD --- */
        .btn-3d {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #1e1b4b; 
            border: 2px solid #1e1b4b;
            font-weight: 800;
        }
        .btn-3d:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1e1b4b;
        }
        
        .btn-3d-secondary { box-shadow: 0 5px 0 #334155; border-color: #334155; }
        .btn-3d-amber { box-shadow: 0 5px 0 #78350f; border-color: #78350f; }

        /* --- RENDERIZADO DE ACORDES --- */
        .chord-line { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.5rem; min-height: 3em; }
        .chord-seg { display: inline-flex; flex-direction: column; vertical-align: bottom; margin-right: 3px; }
        .chord-top { height: 1.4em; font-weight: 900; color: #4338ca; line-height: 1; white-space: nowrap; margin-bottom: 4px; user-select: none; font-family: 'JetBrains Mono', monospace; }
        .text-bottom { line-height: 1.3; white-space: pre; font-weight: 700; color: inherit; }

        /* MODO IMPRESORA */
        @media print {
            .print-hidden, header, .floating-tools, .modal-overlay, button, .tabs-nav, .search-bar, .tools-container { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; }
            .song-content { page-break-after: always; padding-top: 1cm; }
            .chord-top { color: #000 !important; }
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 10px; }

        /* Forzar colores en modo día y noche */
        body { background-color: #f8fafc; color: #020617; }
        .dark body { background-color: #020617 !important; color: #f8fafc !important; }
        
        /* Visibilidad Crítica: Forzamos Negro en modo día */
        .text-vibrant-day { color: #020617 !important; opacity: 1 !important; font-weight: 900 !important; }
        .dark .text-vibrant-day { color: #ffffff !important; }

        .song-card {
            background-color: #ffffff;
            border: 3px solid #000000;
            box-shadow: 0 6px 0 #000000;
        }
        .dark .song-card {
            background-color: #0f172a;
            border-color: #1e293b;
            box-shadow: 0 6px 0 #000000;
        }

        .metronome-visual {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%234338ca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 21 3-10h-6l3 10Z"/><path d="m12 11 1-5h-2l1 5Z"/><circle cx="12" cy="11" r="1"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.FB = { auth, db, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, signInAnonymously, onAuthStateChanged, googleProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
          const fb = window.FB;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [loading, setLoading] = useState(true);
          
          const APP_ID = "corario-estable-final-pro-v2"; 

          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          const [activeSongId, setActiveSongId] = useState(null);
          const [activePlaylistId, setActivePlaylistId] = useState(null);
          const [transposeSteps, setTransposeSteps] = useState(0);
          const [textSize, setTextSize] = useState(22);
          const [isScrolling, setIsScrolling] = useState(false);
          const [scrollSpeed, setScrollSpeed] = useState(2);
          const [bpm, setBpm] = useState(120);
          const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
          
          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editLyrics, setEditLyrics] = useState('');
          const [editKey, setEditKey] = useState('');

          const [searchQuery, setSearchQuery] = useState('');
          const [toast, setToast] = useState(null);
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [aiDevotional, setAiDevotional] = useState(null);

          const [showAuthModal, setShowAuthModal] = useState(false);
          const [authMode, setAuthMode] = useState('login'); 
          const [email, setEmail] = useState('');
          const [pass, setPass] = useState('');

          const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
          const [newPlaylistName, setNewPlaylistName] = useState('');
          const [showAddSongModal, setShowAddSongModal] = useState(false);
          const [playlistMode, setPlaylistMode] = useState('list');

          const audioCtxRef = useRef(null);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          useEffect(() => {
            const unsub = fb.onAuthStateChanged(fb.auth, (u) => {
              if (u) setUser(u);
              else fb.signInAnonymously(fb.auth);
              setLoading(false);
            });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!user) return;
            const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs'), (snap) => {
              setSongs(snap.docs.map(d => ({id: d.id, ...d.data()})));
            });
            const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists'), (snap) => {
              setPlaylists(snap.docs.map(d => ({id: d.id, ...d.data()})));
            });
            return () => { unsubS(); unsubP(); };
          }, [user]);

          // --- MOTOR IA (MODELO CORRECTO) ---
          const handleIA = async (mode) => {
            if (mode === 'reharmonize' && !editLyrics) return showToast("Escribe la letra primero", "error");
            setIsAiLoading(true);
            const apiKey = "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const promptText = mode === 'reharmonize' 
                ? `Actúa como músico experto. Rearmoniza con acordes avanzados entre corchetes [Acorde]. Cifrado Americano. Solo texto rearmonizado:\n${editLyrics}`
                : `Dame un devocional cristiano breve para la alabanza "${songs.find(s=>s.id===activeSongId)?.title}". Un versículo y reflexión corta.`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const data = await response.json();
                const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (result) {
                    const cleaned = result.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
                    if (mode === 'reharmonize') setEditLyrics(cleaned);
                    else setAiDevotional(cleaned);
                    showToast("¡IA completada!");
                }
            } catch (e) { 
                showToast(`Reintentando...`, "error"); 
            } finally { setIsAiLoading(false); }
          };

          useEffect(() => {
            let interval;
            if (isScrolling) {
                interval = setInterval(() => {
                    window.scrollBy({ top: scrollSpeed, behavior: 'auto' });
                }, 50);
            }
            return () => clearInterval(interval);
          }, [isScrolling, scrollSpeed]);

          useEffect(() => {
            let interval;
            if (isMetronomePlaying) {
                interval = setInterval(() => {
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtxRef.current.createOscillator();
                    const gain = audioCtxRef.current.createGain();
                    osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                    osc.frequency.value = 1200;
                    gain.gain.setValueAtTime(0.15, audioCtxRef.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                }, 60000 / bpm);
            }
            return () => clearInterval(interval);
          }, [isMetronomePlaying, bpm]);

          const transposeChord = (chord, steps) => {
            if (!chord || steps === 0) return chord;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
            return chord.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                let n = m.toUpperCase();
                if (mapEs[n]) n = mapEs[n];
                let idx = notes.indexOf(n.replace('B', '#'));
                if (idx === -1) idx = notes.indexOf(n);
                if (idx === -1) return m;
                let newIdx = (idx + steps) % 12;
                if (newIdx < 0) newIdx += 12;
                return notes[newIdx];
            });
          };

          const renderLyrics = (text) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <div key={i} className="h-4"></div>;
                const parts = line.split(/(\[[^\]]+\])/g);
                let segments = [];
                let lastChord = "";
                parts.forEach(p => {
                    if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                    else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                });
                if (lastChord) segments.push({ chord: lastChord, text: "" });
                return (
                    <div key={i} className="chord-line notranslate" translate="no">
                        {segments.map((seg, j) => (
                            <div key={j} className="chord-seg notranslate">
                                <span className="chord-top notranslate" style={{ fontSize: `${textSize*0.75}px` }}>
                                    {seg.chord ? transposeChord(seg.chord, transposeSteps) : '\u00A0'}
                                </span>
                                <span className="text-bottom notranslate text-vibrant-day" style={{ fontSize: `${textSize}px` }}>
                                    {seg.text || (seg.chord ? '\u00A0' : '')}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            });
          };

          const linkChordsManually = () => {
            if (!editLyrics) return;
            const lines = editLyrics.split('\n');
            let result = [];
            const isChord = (w) => /^[A-G][#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i.test(w) || /^(Do|Re|Mi|Fa|Sol|La|Si)[#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i.test(w);
            for (let i = 0; i < lines.length; i++) {
                const current = lines[i]; const next = lines[i+1];
                const words = current.trim().split(/\s+/);
                if (words.length > 0 && words.every(w => isChord(w)) && next) {
                    let merged = next.split(''); let offset = 0;
                    const regex = /([^\s]+)/g; let m;
                    while ((m = regex.exec(current)) !== null) {
                        const tag = `[${m[0]}]`;
                        merged.splice(Math.min(m.index, merged.length) + offset, 0, tag);
                        offset += tag.length;
                    }
                    result.push(merged.join('')); i++; 
                } else { result.push(current); }
            }
            setEditLyrics(result.join('\n'));
            showToast("¡Acordes vinculados!");
          };

          const handleSave = async () => {
            if (!editTitle.trim()) return showToast("Falta el título", "error");
            try {
                const data = { title: editTitle, artist: editArtist, lyrics: editLyrics, musicalKey: editKey, updated: Date.now() };
                if (activeSongId) await fb.updateDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs', activeSongId), data);
                else await fb.addDoc(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs'), data);
                setCurrentView('list'); setEditTitle(''); setEditLyrics('');
                showToast("¡Alabanza guardada!");
            } catch (e) { showToast("Error al guardar", "error"); }
          };

          const handleAuth = async () => {
              if(!email || pass.length < 6) return showToast("Clave min 6 carac.", "error");
              try {
                  if(authMode === 'register') {
                    await fb.createUserWithEmailAndPassword(fb.auth, email, pass);
                    showToast("Registro exitoso");
                  } else {
                    await fb.signInWithEmailAndPassword(fb.auth, email, pass);
                    showToast("Bienvenido");
                  }
                  setShowAuthModal(false);
              } catch(e) { showToast("Email inválido o cuenta ocupada", "error"); }
          };

          const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

          const activeSong = songs.find(s => s.id === activeSongId);
          const activePlaylist = playlists.find(p => p.id === activePlaylistId);

          if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black animate-pulse italic uppercase tracking-widest text-center px-4">PREPARANDO EL MINISTERIO...</div>;

          return (
            <div className="min-h-screen transition-all">
              {toast && <div className={`fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl font-black shadow-2xl z-[600] animate-bounce bg-indigo-600 text-white text-xs tracking-widest uppercase`}>{toast.message}</div>}

              {/* HEADER */}
              <header className="sticky top-0 z-50 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-xl print-hidden">
                <div className="max-w-5xl mx-auto flex flex-row justify-between items-center w-full">
                    <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => {setCurrentView('list'); setIsScrolling(false);}}>
                        <Icon name="music" size={30} className="text-white" />
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter hidden sm:block">Corario AI</h1>
                    </div>
                    <div className="flex items-center gap-3">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-12 h-12 flex items-center justify-center bg-white/10 dark:bg-slate-800 rounded-2xl btn-3d btn-3d-secondary transition-transform active:scale-90">
                            <Icon name={isDarkMode ? "sun" : "moon"} size={22} />
                        </button>
                        {user && !user.isAnonymous ? (
                            <button onClick={() => fb.signOut(fb.auth)} className="w-12 h-12 rounded-2xl border-2 border-white/20 overflow-hidden bg-indigo-500 shadow-md transition-all">
                                <img src={`https://api.dicebear.com/7.x/initials/svg?seed=${user.email}`} className="w-full h-full object-cover" />
                            </button>
                        ) : (
                            <button onClick={() => setShowAuthModal(true)} className="btn-3d bg-white text-indigo-700 px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-widest text-indigo-700">ENTRAR</button>
                        )}
                    </div>
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 md:p-10">
                {currentView === 'list' && (
                    <div className="animate-in">
                        <div className="flex gap-4 mb-10 tabs-nav">
                            <button onClick={() => setActiveTab('songs')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'songs' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>ALABANZAS</button>
                            <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'playlists' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>CULTOS</button>
                        </div>

                        {activeTab === 'songs' ? (
                            <>
                                <div className="flex gap-4 mb-10 search-bar">
                                    <div className="relative flex-1">
                                        <Icon name="search" className="absolute left-6 top-6 opacity-60 text-slate-950 dark:text-white" />
                                        <input type="text" placeholder="Buscar título..." className="w-full pl-16 pr-8 py-6 rounded-[32px] bg-white dark:bg-slate-900 shadow-inner outline-none border-4 border-slate-950 focus:border-indigo-500 font-black text-slate-950 dark:text-white text-xl" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                    </div>
                                    <button onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }} className="btn-3d bg-indigo-600 text-white w-20 h-20 flex items-center justify-center rounded-[32px] shrink-0 shadow-2xl"><Icon name="plus" size={40} /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {songs.filter(s => s.title?.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                        <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setAiDevotional(null); setCurrentView('view');}} className="p-10 song-card rounded-[48px] cursor-pointer flex justify-between items-center group transition-all hover:scale-[1.03]">
                                            <div className="overflow-hidden pr-4">
                                                <h3 className="font-black text-2xl uppercase tracking-tighter truncate text-vibrant-day group-hover:text-indigo-600 transition-colors">{s.title}</h3>
                                                <p className="text-sm font-bold mt-2 uppercase tracking-[0.2em] text-slate-600 dark:text-indigo-300 opacity-80">[{s.musicalKey || 'G'}] • {s.artist || 'ANÓNIMO'}</p>
                                            </div>
                                            <Icon name="chevron-right" className="opacity-40 group-hover:opacity-100 group-hover:translate-x-2 transition-all text-indigo-500" size={32} />
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <button onClick={() => setShowNewPlaylistModal(true)} className="p-16 border-4 border-dashed border-slate-950 rounded-[56px] text-slate-950 dark:text-slate-400 font-black flex flex-col items-center gap-6 hover:bg-white dark:hover:bg-slate-900 transition-all hover:text-indigo-500 hover:border-indigo-500 shadow-inner">
                                    <Icon name="folder-plus" size={56} /> <span className="tracking-[0.3em] uppercase">NUEVO CULTO</span>
                                </button>
                                {playlists.map(p => (
                                    <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView');}} className="p-12 song-card rounded-[64px] hover:border-indigo-500 cursor-pointer shadow-2xl group relative transition-all hover:scale-[1.02]">
                                        <h3 className="text-4xl font-black uppercase italic leading-none mb-6 text-vibrant-day pr-10">{p.name}</h3>
                                        <div className="flex items-center gap-2 text-indigo-600">
                                            <Icon name="list-music" size={20}/>
                                            <p className="text-sm font-black uppercase tracking-widest">{p.songs?.length || 0} CANCIONES</p>
                                        </div>
                                        <button onClick={(e) => {e.stopPropagation(); if(confirm('¿Borrar?')) fb.deleteDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists', p.id));}} className="absolute top-10 right-10 text-red-500 p-3 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-2xl transition-all shadow-sm"><Icon name="trash-2" size={24}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}

                {/* VISTA LECTURA CANCIÓN INDIVIDUAL */}
                {currentView === 'view' && activeSong && (
                    <div className="animate-in pb-40 song-content">
                        <div className="flex justify-between items-center mb-12 print-hidden">
                            <button onClick={() => setCurrentView('list')} className="flex items-center gap-2 font-black uppercase text-sm tracking-widest btn-3d bg-indigo-600 text-white px-8 py-4 rounded-3xl transition-all hover:scale-105 active:scale-95 shadow-xl">
                                <Icon name="arrow-left" size={20}/> VOLVER
                            </button>
                            <div className="flex gap-4">
                                <button onClick={() => window.print()} className="p-4 bg-slate-800 text-white rounded-2xl btn-3d shadow-lg" title="Imprimir"><Icon name="printer" size={28}/></button>
                                <button onClick={() => { 
                                    setEditTitle(activeSong.title); setEditArtist(activeSong.artist || ''); 
                                    setEditLyrics(activeSong.lyrics); setEditKey(activeSong.musicalKey || ''); 
                                    setCurrentView('edit'); 
                                }} className="p-4 bg-emerald-600 text-white rounded-2xl btn-3d shadow-lg" title="Editar"><Icon name="edit-3" size={28}/></button>
                            </div>
                        </div>

                        <div className="mb-20">
                            <h2 className="text-7xl sm:text-9xl font-black mb-6 uppercase leading-none tracking-tighter text-vibrant-day">{activeSong.title}</h2>
                            <p className="text-4xl opacity-60 italic mb-14 uppercase tracking-widest font-bold text-vibrant-day">{activeSong.artist || 'MÚSICA CRISTIANA'}</p>
                            
                            <div className="flex flex-wrap gap-6 items-center bg-white dark:bg-slate-900 p-8 rounded-[48px] shadow-2xl border-4 border-slate-950 dark:border-slate-800 print-hidden tools-container">
                                <div className="flex items-center gap-4">
                                    <button onClick={()=>setTransposeSteps(s=>s-1)} className="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-3xl font-black btn-3d btn-3d-secondary text-2xl shadow-md text-vibrant-day">-</button>
                                    <div className="px-10 font-black text-indigo-600 uppercase tracking-[0.2em] text-3xl">{transposeSteps === 0 ? (activeSong.musicalKey || 'G') : transposeChord(activeSong.musicalKey, transposeSteps)}</div>
                                    <button onClick={()=>setTransposeSteps(s=>s+1)} className="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-3xl font-black btn-3d btn-3d-secondary text-2xl shadow-md text-vibrant-day">+</button>
                                </div>
                                <div className="hidden sm:block h-16 w-1 bg-slate-200 dark:bg-slate-800 mx-8 rounded-full"></div>
                                <div className="flex items-center gap-4 text-vibrant-day">
                                    <button onClick={()=>setBpm(b=>Math.max(40, b-5))} className="w-14 h-14 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black btn-3d btn-3d-secondary shadow-md">-</button>
                                    
                                    <div className="flex flex-col items-center w-28 bg-slate-50 dark:bg-slate-950 p-2 rounded-2xl shadow-inner border-4 border-slate-950">
                                        <div className="metronome-visual w-6 h-6 mb-1 text-indigo-600"></div>
                                        <span className="font-mono font-black text-3xl leading-none text-slate-950 dark:text-white">{bpm}</span>
                                        <span className="text-[10px] font-black opacity-60 mt-1 tracking-widest uppercase text-slate-950 dark:text-white">BPM</span>
                                    </div>

                                    <button onClick={()=>setBpm(b=>Math.min(240, b+5))} className="w-14 h-14 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black btn-3d btn-3d-secondary shadow-md">+</button>
                                    <button onClick={()=>setIsMetronomePlaying(!isMetronomePlaying)} className={`w-16 h-16 rounded-[24px] btn-3d shadow-xl ml-4 flex items-center justify-center text-white ${isMetronomePlaying?'bg-red-600 shadow-red-500/20':'bg-emerald-600 shadow-emerald-500/20'}`}>
                                        <Icon name={isMetronomePlaying ? "pause" : "play"} size={32}/>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="pb-60 px-4 text-5xl leading-[1.8] font-bold text-vibrant-day">{renderLyrics(activeSong.lyrics)}</div>
                    </div>
                )}

                {/* VISTA CULTO SELECCIONADO */}
                {currentView === 'playlistView' && activePlaylist && (
                    <div className="animate-in pb-60">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-10 border-b-8 border-indigo-500/10 pb-14 print-hidden">
                            <div className="flex-1">
                                <button onClick={() => { setCurrentView('list'); setPlaylistMode('list'); }} className="flex items-center gap-2 font-black uppercase text-sm tracking-widest btn-3d bg-indigo-600 text-white px-8 py-4 rounded-3xl transition-all hover:scale-105 active:scale-95 shadow-xl mb-6">
                                    <Icon name="chevron-left" size={20}/> VOLVER
                                </button>
                                <h2 className="text-8xl font-black uppercase tracking-tighter leading-none break-words italic text-vibrant-day">{activePlaylist.name}</h2>
                            </div>
                            <div className="flex flex-wrap gap-5 w-full md:w-auto">
                                <button onClick={() => { const url = window.location.origin + window.location.pathname + '?share=' + activePlaylist.id; navigator.clipboard.writeText(url); showToast("Enlace copiado"); }} className="p-6 bg-indigo-600 text-white rounded-[32px] btn-3d shadow-xl border-4 border-indigo-800 transition-all" title="Compartir"><Icon name="share-2" size={32} /></button>
                                <button onClick={() => setPlaylistMode(playlistMode === 'list' ? 'full' : 'list')} className={`flex-1 md:flex-none btn-3d px-12 py-6 rounded-[40px] font-black text-sm tracking-widest flex items-center justify-center gap-4 shadow-2xl transition-all bg-indigo-600 text-white border-indigo-800`}>
                                    <Icon name={playlistMode === 'list' ? "eye" : "settings"} size={28} /> {playlistMode === 'list' ? "PRESENTACIÓN" : "MODO GESTIÓN"}
                                </button>
                                <button onClick={()=>setShowAddSongModal(true)} className="p-6 bg-indigo-600 text-white rounded-[32px] btn-3d shadow-2xl border-4 border-indigo-800 transition-all" title="Añadir Alabanza"><Icon name="plus" size={40}/></button>
                            </div>
                        </div>

                        {playlistMode === 'list' ? (
                            <div className="space-y-6 print-hidden">
                                {activePlaylist.songs?.map((sid, idx) => {
                                    const s = songs.find(x => x.id === sid);
                                    if (!s) return null;
                                    return (
                                        <div key={idx} className="flex items-center p-10 song-card rounded-[64px] border-4 transition-all hover:scale-[1.02]">
                                            <div className="w-20 h-20 rounded-[30px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 flex items-center justify-center font-black text-4xl mr-10 shadow-inner">{idx+1}</div>
                                            <div className="flex-1 cursor-pointer truncate" onClick={() => {setActiveSongId(s.id); setCurrentView('view')}}>
                                                <h4 className="font-black text-4xl uppercase tracking-tighter mb-2 text-vibrant-day">{s.title}</h4>
                                                <p className="text-lg opacity-60 font-black tracking-widest text-slate-700 dark:text-indigo-300">[{s.musicalKey || 'G'}] • {s.artist}</p>
                                            </div>
                                            <button onClick={async ()=>{ const news = activePlaylist.songs.filter(id => id !== sid); await fb.updateDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists', activePlaylist.id), { songs: news }); }} className="p-5 text-red-600 opacity-0 group-hover:opacity-100 transition-all hover:bg-red-50 dark:hover:bg-red-900/30 rounded-3xl"><Icon name="trash-2" size={32}/></button>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="space-y-[50vh] pb-80">
                                {activePlaylist.songs?.map((sid, idx) => {
                                    const s = songs.find(x => x.id === sid);
                                    if (!s) return null;
                                    return (
                                        <div key={idx} className="song-presentation animate-in px-4 text-left">
                                            <div className="mb-24 border-b-[15px] border-indigo-600/10 pb-12 flex items-end gap-12 text-vibrant-day">
                                                {/* CORRECCIÓN: NÚMERO AZUL EN MODO PRESENTACIÓN */}
                                                <span className="text-[18rem] font-black text-indigo-600 leading-none -mb-16 select-none">{idx + 1}</span>
                                                <div className="flex-1 pb-8 text-left text-vibrant-day">
                                                    <h3 className="text-8xl sm:text-[11rem] font-black dark:text-white leading-none mb-10 tracking-tighter uppercase italic text-vibrant-day">{s.title}</h3>
                                                    <div className="flex flex-wrap items-center gap-6 opacity-80 font-black text-6xl tracking-widest uppercase text-vibrant-day">
                                                        <span>TONO: [{s.musicalKey}]</span>
                                                        <span className="opacity-50 text-indigo-400">•</span>
                                                        <span>{s.artist}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-7xl font-black leading-[2] text-vibrant-day text-left">{renderLyrics(s.lyrics)}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                )}

                {/* --- EDITOR --- */}
                {currentView === 'edit' && (
                    <div className="animate-in pb-20">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8 text-vibrant-day">
                            <h2 className="text-6xl font-black uppercase italic tracking-tighter leading-none">Editor</h2>
                            <div className="flex gap-4 w-full sm:w-auto">
                                <button onClick={() => setCurrentView('list')} className="px-8 py-5 font-black uppercase text-sm tracking-widest hover:bg-slate-200 dark:hover:bg-slate-800 rounded-2xl transition-all">CANCELAR</button>
                                <button onClick={handleSave} className="flex-1 btn-3d bg-indigo-600 text-white px-14 py-5 rounded-[32px] font-black text-xs flex items-center justify-center gap-4 shadow-2xl uppercase tracking-[0.2em] transition-all">
                                    <Icon name="save" size={24}/> GUARDAR
                                </button>
                            </div>
                        </div>
                        <div className="space-y-10">
                            <input type="text" placeholder="TÍTULO DE LA ALABANZA..." className="w-full p-10 rounded-[48px] bg-slate-50 dark:bg-slate-900 border-4 border-slate-950 focus:border-indigo-600 font-black text-4xl uppercase outline-none shadow-2xl dark:text-white transition-all text-slate-950" value={editTitle} onChange={e=>setEditTitle(e.target.value)} />
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                <input type="text" placeholder="COMPOSITOR / AUTOR" className="w-full p-8 rounded-[32px] bg-slate-50 dark:bg-slate-900 border-4 border-slate-700 font-black text-xl text-slate-950 dark:text-white shadow-inner" value={editArtist} onChange={e=>setEditArtist(e.target.value)} />
                                <input type="text" placeholder="TONO (EJ: G)" className="w-full p-8 rounded-[32px] bg-slate-50 dark:bg-slate-900 border-4 border-slate-700 font-black text-xl text-slate-950 dark:text-white shadow-inner" value={editKey} onChange={e=>setEditKey(e.target.value)} />
                            </div>
                            
                            <button onClick={linkChordsManually} className="w-full py-10 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 rounded-[40px] font-black text-2xl tracking-[0.2em] border-4 border-indigo-600 flex items-center justify-center gap-5 hover:bg-indigo-100 transition-all btn-3d btn-3d-secondary shadow-xl uppercase">
                                <Icon name="wand-2" size={40} /> VINCULAR ACORDES CON LETRA
                            </button>

                            <textarea placeholder="Pega letra con acordes encima..." className="w-full h-[700px] p-12 rounded-[80px] bg-slate-50 dark:bg-slate-900 border-4 border-slate-950 font-mono text-2xl font-bold leading-relaxed outline-none focus:ring-[30px] ring-indigo-500/5 custom-scrollbar resize-none dark:text-white shadow-inner text-slate-950" value={editLyrics} onChange={e=>setEditLyrics(e.target.value)} />
                        </div>
                    </div>
                )}
              </main>

              {/* CONTROLES FLOTANTES: SCROLL */}
              {(currentView === 'view' || (currentView === 'playlistView' && playlistMode === 'full')) && (
                <div className="fixed bottom-12 right-12 flex flex-col items-center gap-8 z-[100] print-hidden floating-tools">
                    {isScrolling && (
                        <div className="bg-white/95 dark:bg-slate-900/95 backdrop-blur-3xl p-8 rounded-[56px] shadow-2xl flex flex-col items-center gap-8 border-4 border-indigo-600/30 animate-in slide-in-from-bottom-10">
                            <button onClick={()=>setScrollSpeed(s=>Math.min(10, s+1))} className="w-20 h-20 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-[30px] btn-3d btn-3d-secondary shadow-lg text-vibrant-day transition-all"><Icon name="chevron-up" size={40} /></button>
                            <div className="flex flex-col items-center"><span className="font-black text-indigo-600 text-6xl leading-none">{scrollSpeed}</span><span className="text-xs font-black opacity-60 uppercase mt-4 tracking-widest text-vibrant-day">VELOCIDAD</span></div>
                            <button onClick={()=>setScrollSpeed(s=>Math.max(1, s-1))} className="w-20 h-20 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-[30px] btn-3d btn-3d-secondary shadow-lg text-vibrant-day transition-all"><Icon name="chevron-down" size={40} /></button>
                        </div>
                    )}
                    <button onClick={() => setIsScrolling(!isScrolling)} className={`w-32 h-32 rounded-full btn-3d flex items-center justify-center shadow-2xl ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'} text-white transform hover:scale-110 active:scale-95 transition-all`}>
                        <Icon name={isScrolling ? "pause" : "play"} size={64} className={!isScrolling ? "ml-4" : ""} />
                    </button>
                </div>
              )}

              {/* MODALES */}
              {showNewPlaylistModal && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[1000] animate-in text-center modal-overlay">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[72px] p-20 shadow-2xl relative border-8 border-indigo-500/10 text-vibrant-day transition-all">
                        <h3 className="text-5xl font-black uppercase mb-12 italic tracking-tighter leading-none">Nombre del Culto</h3>
                        <input type="text" placeholder="DOMINGO MAÑANA" className="w-full p-10 bg-slate-50 dark:bg-slate-900 rounded-[40px] mb-14 outline-none border-4 border-slate-950 font-black text-center text-4xl uppercase shadow-inner dark:text-white text-slate-950" value={newPlaylistName} onChange={e=>setNewPlaylistName(e.target.value)} autoFocus />
                        <div className="flex gap-6">
                            <button onClick={()=>setShowNewPlaylistModal(false)} className="flex-1 py-6 font-black opacity-40 hover:opacity-100 uppercase text-sm tracking-[0.2em] text-vibrant-day">CANCELAR</button>
                            <button onClick={async () => { if(newPlaylistName && user){ await fb.addDoc(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists'), { name: newPlaylistName.trim().toUpperCase(), songs: [], updated: Date.now() }); setShowNewPlaylistModal(false); setNewPlaylistName(''); showToast("¡SERVICIO CREADO!"); } }} className="flex-1 bg-indigo-600 text-white py-8 rounded-[40px] font-black btn-3d shadow-xl text-lg tracking-widest uppercase text-sm text-center">CREAR</button>
                        </div>
                    </div>
                </div>
              )}

              {showAuthModal && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[1000] animate-in text-center">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[72px] p-14 shadow-2xl relative border-8 border-indigo-600/10 text-slate-950 dark:text-white transition-all">
                        <button onClick={()=>setShowAuthModal(false)} className="absolute top-8 right-8 p-3 opacity-30 hover:opacity-100 text-vibrant-day"><Icon name="x" size={32}/></button>
                        <div className="flex gap-4 mb-10">
                            <button onClick={()=>setAuthMode('login')} className={`flex-1 py-4 font-black rounded-3xl border-4 transition-all ${authMode==='login'?'bg-indigo-600 text-white border-indigo-800':'text-vibrant-day opacity-40 border-transparent hover:opacity-70'}`}>ENTRAR</button>
                            <button onClick={()=>setAuthMode('register')} className={`flex-1 py-4 font-black rounded-3xl border-4 transition-all ${authMode==='register'?'bg-indigo-600 text-white border-indigo-800':'text-vibrant-day opacity-40 border-transparent hover:opacity-70'}`}>REGISTRAR</button>
                        </div>
                        <div className="space-y-6">
                            <input type="email" placeholder="EMAIL" className="w-full p-6 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none border-4 border-slate-950 text-vibrant-day transition-all" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="CONTRASEÑA" className="w-full p-6 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none border-4 border-slate-950 text-vibrant-day transition-all" value={pass} onChange={e=>setPass(e.target.value)} />
                            <button onClick={handleAuth} className="w-full py-8 bg-indigo-600 text-white rounded-[40px] font-black btn-3d shadow-xl uppercase tracking-[0.2em] text-lg transition-all text-center">{authMode === 'login' ? 'INICIAR SESIÓN' : 'CREAR MI CUENTA'}</button>
                            <div className="flex items-center gap-4 py-4 opacity-30"><div className="h-px bg-current flex-1"></div><span className="font-black text-xs uppercase">O CON</span><div className="h-px bg-current flex-1"></div></div>
                            <button onClick={async () => { try { await fb.signInWithPopup(fb.auth, fb.googleProvider); setShowAuthModal(false); } catch(e) { showToast("Error con Google", "error"); } }} className="w-full py-6 bg-white dark:bg-slate-800 border-4 border-slate-950 rounded-3xl font-black text-sm flex items-center justify-center gap-4 btn-3d shadow-md transition-all text-vibrant-day"><img src="https://www.google.com/favicon.ico" className="w-6 h-6" /> GOOGLE</button>
                        </div>
                    </div>
                </div>
              )}

              {showAddSongModal && activePlaylist && (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl flex items-center justify-center p-4 z-[1000] animate-in modal-overlay">
                    <div className="bg-white dark:bg-slate-900 w-full max-w-3xl rounded-[90px] p-16 shadow-2xl max-h-[90vh] flex flex-col border-8 border-indigo-500/5">
                        <div className="flex justify-between items-center mb-14 px-8 text-left">
                            <div className="flex-1 text-vibrant-day"><h3 className="text-6xl font-black uppercase italic tracking-tighter leading-none mb-4">Gestión</h3><p className="text-sm opacity-40 font-black uppercase tracking-[0.5em]">{activePlaylist.name}</p></div>
                            <button onClick={()=>setShowAddSongModal(false)} className="p-8 bg-slate-100 dark:bg-slate-800 rounded-[40px] opacity-40 hover:opacity-100 text-vibrant-day shadow-md transition-all"><Icon name="x" size={40}/></button>
                        </div>
                        <div className="overflow-y-auto space-y-5 flex-1 pr-6 custom-scrollbar px-6 pb-12">
                            {songs.map(s => (
                                <button key={s.id} onClick={async () => {
                                    const hasSong = activePlaylist.songs?.includes(s.id);
                                    let updatedSongs = hasSong ? activePlaylist.songs.filter(id => id !== s.id) : [...(activePlaylist.songs || []), s.id];
                                    showToast(hasSong ? `QUITADA: ${s.title.toUpperCase()}` : `AÑADIDA: ${s.title.toUpperCase()}`, hasSong ? "error" : "success");
                                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists', activePlaylist.id), { songs: updatedSongs });
                                }} className={`w-full p-10 rounded-[56px] border-4 text-left flex justify-between items-center transition-all ${activePlaylist.songs?.includes(s.id) ? 'bg-indigo-600 border-indigo-400 text-white translate-x-4 shadow-2xl scale-[1.02]' : 'bg-white dark:bg-slate-800 border-slate-950 hover:border-indigo-500/40 shadow-lg'}`}>
                                    <div className="flex-1 truncate pr-10 text-left">
                                        <p className="font-black text-3xl uppercase tracking-tighter leading-none mb-3 text-slate-950 dark:text-white">{s.title}</p>
                                        <p className={`text-sm font-bold uppercase tracking-widest ${activePlaylist.songs?.includes(s.id) ? 'text-indigo-200' : 'opacity-40 text-vibrant-day'}`}>{s.artist || 'SIN AUTOR'}</p>
                                    </div>
                                    <Icon name={activePlaylist.songs?.includes(s.id) ? "check-circle" : "circle-plus"} size={48} className={activePlaylist.songs?.includes(s.id) ? "text-white" : "text-indigo-600"}/>
                                </button>
                            ))}
                        </div>
                        <button onClick={()=>setShowAddSongModal(false)} className="w-full bg-indigo-600 text-white py-10 rounded-[48px] font-black mt-10 btn-3d shadow-2xl tracking-[0.4em] uppercase text-2xl text-center">LISTO</button>
                    </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
