<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>My Corario - App Oficial</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&family=Playfair+Display:wght@700&display=swap');
        
        :root { --indigo-primary: #4338ca; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            margin: 0; 
            min-height: 100vh;
        }

        .notranslate { translate: no !important; }

        /* --- BOTONES 3D --- */
        .btn-3d {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #1e1b4b; 
            border: 2px solid #1e1b4b;
            font-weight: 800;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e1b4b;
        }
        
        .btn-3d-secondary { box-shadow: 0 4px 0 #334155; border-color: #334155; }

        /* --- RENDERIZADO DE ACORDES --- */
        .chord-line { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.5rem; min-height: 3em; }
        .chord-seg { display: inline-flex; flex-direction: column; vertical-align: bottom; margin-right: 4px; }
        .chord-top { height: 1.4em; font-weight: 900; line-height: 1; white-space: nowrap; margin-bottom: 4px; user-select: none; font-family: 'JetBrains Mono', monospace; }
        .text-bottom { line-height: 1.3; white-space: pre; font-weight: 700; color: inherit; }

        /* MODO IMPRESORA */
        @media print {
            .print-hidden, header, .floating-tools, .modal-overlay, button, .tabs-nav, .search-bar, .tools-container { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; }
            .song-content { page-break-after: always; padding-top: 1cm; }
            .chord-top { color: #000 !important; }
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 10px; }

        /* Colores Dinámicos */
        body { background-color: #f8fafc; color: #020617; }
        .dark body { background-color: #020617 !important; color: #f8fafc !important; }
        
        .text-vibrant-day { color: #020617 !important; opacity: 1 !important; font-weight: 900 !important; }
        .dark .text-vibrant-day { color: #ffffff !important; }

        .song-card { background-color: #ffffff; border: 3px solid #000000; box-shadow: 0 6px 0 #000000; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .dark .song-card { background-color: #0f172a; border-color: #1e293b; box-shadow: 0 6px 0 #000000; }
        
        .font-modern { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        window.FB = { auth, db, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, signInAnonymously, onAuthStateChanged, googleProvider, signInWithRedirect, getRedirectResult, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithCustomToken };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
            const fb = window.FB;
            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [playlists, setPlaylists] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('list'); 
            const [activeTab, setActiveTab] = useState('songs');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [activeSongId, setActiveSongId] = useState(null);
            const [activePlaylistId, setActivePlaylistId] = useState(null);
            const [transposeSteps, setTransposeSteps] = useState(0);
            const [textSize, setTextSize] = useState(22);
            const [isScrolling, setIsScrolling] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(2);
            const [bpm, setBpm] = useState(120);
            const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [toast, setToast] = useState(null);
            const [itemToDelete, setItemToDelete] = useState(null);

            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
            const [newPlaylistName, setNewPlaylistName] = useState('');
            const [showAddSongModal, setShowAddSongModal] = useState(false);
            const [playlistMode, setPlaylistMode] = useState('list');

            const [fontStyle, setFontStyle] = useState('font-modern');
            const [lyricColor, setLyricColor] = useState('default');
            const [chordColor, setChordColor] = useState('default');
            const [showStylePanel, setShowStylePanel] = useState(false);

            const [editTitle, setEditTitle] = useState('');
            const [editArtist, setEditArtist] = useState('');
            const [editLyrics, setEditLyrics] = useState('');
            const [editKey, setEditKey] = useState('');

            const audioCtxRef = useRef(null);
            const textareaRef = useRef(null);
            const appId = "my-corario-master-v101";

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // --- AUTH LOGIC ---
            useEffect(() => {
                const initAuth = async () => {
                    if (window.location.protocol.startsWith('http')) {
                        try {
                            const result = await fb.getRedirectResult(fb.auth);
                            if (result?.user) {
                                setUser(result.user);
                                showToast("¡Sincronizado!");
                            }
                        } catch (e) { console.error(e); }
                    }

                    fb.onAuthStateChanged(fb.auth, (u) => {
                        setUser(u);
                        if (!u) fb.signInAnonymously(fb.auth).catch(() => {});
                        setLoading(false);
                    });
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), (snap) => {
                    setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'playlists'), (snap) => {
                    setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubS(); unsubP(); };
            }, [user]);

            useEffect(() => {
                let interval;
                if (isScrolling) interval = setInterval(() => window.scrollBy(0, scrollSpeed), 50);
                return () => clearInterval(interval);
            }, [isScrolling, scrollSpeed]);

            useEffect(() => {
                let interval;
                if (isMetronomePlaying) {
                    interval = setInterval(() => {
                        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtxRef.current.createOscillator();
                        const gain = audioCtxRef.current.createGain();
                        osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                        osc.frequency.value = 1000;
                        gain.gain.setValueAtTime(0.2, audioCtxRef.current.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05);
                        osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                    }, 60000 / bpm);
                }
                return () => clearInterval(interval);
            }, [isMetronomePlaying, bpm]);

            const lyricStyleMap = { 'default': isDarkMode ? '#f8fafc' : '#020617', 'blue': '#2563eb', 'emerald': '#059669', 'rose': '#e11d48', 'amber': '#d97706' };
            const chordStyleMap = { 'default': '#4338ca', 'red': '#dc2626', 'teal': '#0d9488', 'violet': '#7c3aed', 'orange': '#ea580c' };

            const transposeChord = (chordStr, steps) => {
                if (!chordStr || steps === 0) return chordStr;
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
                return chordStr.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                    let n = m.toUpperCase(); if (mapEs[n]) n = mapEs[n];
                    let idx = notes.indexOf(n.replace('B', '#'));
                    if (idx === -1) idx = notes.indexOf(n);
                    if (idx === -1) return m;
                    let newIdx = (idx + steps) % 12; if (newIdx < 0) newIdx += 12;
                    return notes[newIdx];
                });
            };

            const renderLyrics = (text, steps = transposeSteps) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-4"></div>;
                    const parts = line.split(/(\[[^\]]+\])/g);
                    let segments = []; let lastChord = "";
                    parts.forEach(p => {
                        if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                        else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                    });
                    if (lastChord) segments.push({ chord: lastChord, text: "" });
                    return (
                        <div key={i} className={`chord-line notranslate ${fontStyle}`} translate="no">
                            {segments.map((seg, j) => (
                                <div key={j} className="chord-seg">
                                    <span className="chord-top" style={{ fontSize: `${textSize*0.75}px`, color: chordStyleMap[chordColor] }}>
                                        {seg.chord ? transposeChord(seg.chord, steps) : '\u00A0'}
                                    </span>
                                    <span className="text-bottom" style={{ fontSize: `${textSize}px`, color: lyricStyleMap[lyricColor] }}>
                                        {seg.text || (seg.chord ? '\u00A0' : '')}
                                    </span>
                                </div>
                            ))}
                        </div>
                    );
                });
            };

            const handleSave = async () => {
                if (!editTitle.trim()) return showToast("Falta el título", "error");
                try {
                    const data = { title: editTitle, artist: editArtist, lyrics: editLyrics, musicalKey: editKey, updatedAt: Date.now() };
                    if (activeSongId) await fb.updateDoc(fb.doc(fb.db, 'artifacts', appId, 'users', user.uid, 'songs', activeSongId), data);
                    else await fb.addDoc(fb.collection(fb.db, 'artifacts', appId, 'users', user.uid, 'songs'), data);
                    setCurrentView('list'); showToast("¡Guardado!");
                } catch (e) { showToast("Error", "error"); }
            };

            const handleAuth = async (type) => {
                if (!email || pass.length < 6) return showToast("Datos inválidos", "error");
                try {
                    if (type === 'register') await fb.createUserWithEmailAndPassword(fb.auth, email, pass);
                    else await fb.signInWithEmailAndPassword(fb.auth, email, pass);
                    setShowAuthModal(false); showToast("¡Bienvenido!");
                } catch (e) { showToast("Error de acceso", "error"); }
            };

            const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

            const linkChordsManually = () => {
                if (!editLyrics) return;
                const lines = editLyrics.split('\n');
                let result = [];
                const chordRegex = /^([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?(m|maj|min|dim|aug|sus|add|[0-9]|[-+()/#])*$/i;
                for (let i = 0; i < lines.length; i++) {
                    const current = lines[i]; const next = lines[i+1];
                    const words = current.trim().split(/\s+/);
                    const isChordLine = words.length > 0 && words.every(w => chordRegex.test(w));
                    if (isChordLine && next) {
                        let merged = next.split(''); let offset = 0;
                        const regex = /([^\s]+)/g; let m;
                        while ((m = regex.exec(current)) !== null) {
                            const tag = `[${m[0]}]`;
                            merged.splice(Math.min(m.index + offset, merged.length), 0, tag);
                            offset += tag.length;
                        }
                        result.push(merged.join('')); i++; 
                    } else result.push(current);
                }
                setEditLyrics(result.join('\n'));
                showToast("¡Acordes vinculados!");
            };

            const insertBracket = (side) => {
                if (!textareaRef.current) return;
                const start = textareaRef.current.selectionStart;
                const end = textareaRef.current.selectionEnd;
                setEditLyrics(editLyrics.substring(0, start) + (side === 'left' ? '[' : ']') + editLyrics.substring(end));
                setTimeout(() => { textareaRef.current.focus(); textareaRef.current.setSelectionRange(start + 1, start + 1); }, 0);
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black italic uppercase animate-pulse">Abriendo Corario...</div>;

            const activeSong = songs.find(s => s.id === activeSongId);
            const activePlaylist = playlists.find(p => p.id === activePlaylistId);

            const TransposeToolbar = ({ songKey }) => (
                <div className="flex items-center gap-2 p-2 bg-white dark:bg-slate-900 rounded-3xl border-2 border-slate-950 dark:border-slate-800 shadow-sm print-hidden max-w-fit mt-4">
                    <button onClick={()=>setTransposeSteps(s=>s-1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">-</button>
                    <div className="px-4 font-black text-indigo-600 uppercase text-sm min-w-[100px] text-center">
                        {transposeSteps === 0 ? (songKey || 'G') : transposeChord(songKey || 'G', transposeSteps)}
                    </div>
                    <button onClick={()=>setTransposeSteps(s=>s+1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">+</button>
                </div>
            );

            return (
                <div className="min-h-screen transition-all">
                    {toast && <div className="fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-black shadow-2xl z-[200] bg-indigo-600 text-white animate-bounce">{toast.message}</div>}

                    {/* HEADER CON PERFIL */}
                    <header className="sticky top-0 z-40 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => {setCurrentView('list'); setIsScrolling(false);}}>
                            <Icon name="music" size={28} />
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter hidden sm:block">My Corario</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-10 h-10 flex items-center justify-center bg-white/10 dark:bg-slate-800 rounded-xl">
                                <Icon name={isDarkMode ? "sun" : "moon"} size={20} />
                            </button>
                            
                            {user && !user.isAnonymous ? (
                                <div className="flex items-center gap-2 bg-black/20 pl-3 pr-1 py-1 rounded-full border border-white/20 shadow-inner">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-[8px] font-black opacity-60 uppercase leading-none">Cuenta Pro</p>
                                        <p className="text-[10px] font-bold leading-tight truncate max-w-[80px]">{user.displayName || user.email.split('@')[0]}</p>
                                    </div>
                                    <button onClick={() => fb.signOut(fb.auth)} className="w-9 h-9 rounded-full border-2 border-indigo-400 overflow-hidden shadow-xl hover:scale-110 active:scale-95 transition-all bg-white">
                                        <img 
                                            src={user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'U')}&background=4338ca&color=fff&bold=true`} 
                                            className="w-full h-full object-cover" 
                                            referrerPolicy="no-referrer"
                                            alt="perfil"
                                        />
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setShowAuthModal(true)} className="btn-3d bg-white text-indigo-700 px-5 py-2 rounded-xl font-black text-xs uppercase tracking-tighter">ENTRAR</button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-10">
                        {currentView === 'list' && (
                            <div className="animate-in">
                                <div className="flex gap-4 mb-10 tabs-nav">
                                    <button onClick={() => setActiveTab('songs')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'songs' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>ALABANZAS</button>
                                    <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'playlists' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>CULTOS</button>
                                </div>

                                {activeTab === 'songs' ? (
                                    <>
                                        <div className="flex gap-4 mb-10">
                                            <div className="relative flex-1">
                                                <Icon name="search" className="absolute left-4 top-3.5 opacity-60 text-slate-950 dark:text-white" />
                                                <input type="text" placeholder="Buscar..." className="w-full pl-12 pr-8 py-3.5 rounded-2xl bg-white dark:bg-slate-900 border-4 border-slate-950 focus:border-indigo-600 font-black text-xl shadow-sm" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                            </div>
                                            <button onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }} className="btn-3d bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-2xl"><Icon name="plus" size={28} /></button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {songs.filter(s => (s.title || '').toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                                <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view');}} className="p-5 song-card rounded-[32px] cursor-pointer flex justify-between items-center group transition-all text-left">
                                                    <div>
                                                        <h3 className="font-black text-xl uppercase truncate text-vibrant-day">{s.title}</h3>
                                                        <p className="text-xs font-bold mt-1 opacity-60 uppercase tracking-widest text-vibrant-day">[{s.musicalKey || 'G'}] • {s.artist || 'ANÓNIMO'}</p>
                                                    </div>
                                                    <Icon name="chevron-right" className="opacity-20" />
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <button onClick={() => setShowNewPlaylistModal(true)} className="p-16 border-4 border-dashed border-slate-950 rounded-[56px] text-slate-950 dark:text-slate-400 font-black flex flex-col items-center gap-6 hover:bg-white dark:hover:bg-slate-900 transition-all">
                                            <Icon name="folder-plus" size={56} /> <span className="tracking-[0.3em] uppercase">NUEVO CULTO</span>
                                        </button>
                                        {playlists.map(p => (
                                            <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView');}} className="p-12 song-card rounded-[64px] hover:border-indigo-500 cursor-pointer relative text-left">
                                                <h3 className="text-4xl font-black uppercase italic text-vibrant-day">{p.name}</h3>
                                                <p className="text-sm font-bold text-indigo-600 mt-4 uppercase">{(p.songs || []).length} CANCIONES</p>
                                                <button onClick={(e) => {e.stopPropagation(); setItemToDelete({type:'playlist', id: p.id}); }} className="absolute top-10 right-10 text-red-500"><Icon name="trash-2" size={24}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentView === 'view' && activeSong && (
                            <div className="animate-in pb-40 text-left">
                                <div className="flex justify-between items-center mb-12 print-hidden">
                                    <button onClick={() => { setCurrentView('list'); setIsScrolling(false); }} className="flex items-center gap-2 font-black uppercase text-sm btn-3d bg-indigo-600 text-white px-8 py-4 rounded-3xl transition-all">
                                        <Icon name="arrow-left" size={20}/> VOLVER
                                    </button>
                                    <div className="flex gap-2">
                                        <button className="p-4 bg-white dark:bg-slate-800 text-indigo-600 rounded-2xl btn-3d btn-3d-secondary" onClick={() => setShowStylePanel(!showStylePanel)}><Icon name="palette" size={28}/></button>
                                        <button onClick={() => window.print()} className="p-4 bg-slate-800 text-white rounded-2xl btn-3d"><Icon name="printer" size={28}/></button>
                                        <button onClick={() => { setEditTitle(activeSong.title); setEditArtist(activeSong.artist || ''); setEditLyrics(activeSong.lyrics); setEditKey(activeSong.musicalKey || ''); setCurrentView('edit'); }} className="p-4 bg-indigo-600 text-white rounded-2xl btn-3d"><Icon name="edit-3" size={28}/></button>
                                    </div>
                                </div>
                                <h2 className="text-7xl md:text-9xl font-black mb-6 uppercase tracking-tighter italic text-vibrant-day">{activeSong.title}</h2>
                                <p className="text-4xl opacity-60 italic mb-14 uppercase tracking-widest text-vibrant-day">{activeSong.artist || 'MÚSICA CRISTIANA'}</p>
                                <TransposeToolbar songKey={activeSong.musicalKey} />
                                <div className="pb-60 pt-10 font-bold leading-relaxed">{renderLyrics(activeSong.lyrics)}</div>
                            </div>
                        )}

                        {currentView === 'edit' && (
                            <div className="animate-in pb-20 text-left">
                                <h2 className="text-6xl font-black uppercase italic mb-10">Editor</h2>
                                <div className="space-y-10">
                                    <input type="text" placeholder="Título..." className="w-full p-10 rounded-[48px] border-4 border-slate-950 focus:border-indigo-600 font-black text-4xl uppercase outline-none shadow-inner dark:bg-slate-900" value={editTitle} onChange={e=>setEditTitle(e.target.value)} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                        <input type="text" placeholder="Compositor..." className="w-full p-8 rounded-[32px] border-4 border-slate-700 font-black text-xl dark:bg-slate-900 shadow-inner" value={editArtist} onChange={e=>setEditArtist(e.target.value)} />
                                        <input type="text" placeholder="Tono..." className="w-full p-8 rounded-[32px] border-4 border-slate-700 font-black text-xl dark:bg-slate-900 shadow-inner" value={editKey} onChange={e=>setEditKey(e.target.value)} />
                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-4">
                                        <button onClick={linkChordsManually} className="flex-1 py-10 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 rounded-[40px] font-black text-2xl border-4 border-indigo-600 flex items-center justify-center gap-5 btn-3d">
                                            <Icon name="wand-2" size={40} /> VINCULAR ACORDES
                                        </button>
                                        <div className="flex gap-4">
                                            <button onClick={() => insertBracket('left')} className="w-20 h-20 bg-white dark:bg-slate-800 rounded-3xl btn-3d text-4xl font-black">[</button>
                                            <button onClick={() => insertBracket('right')} className="w-20 h-20 bg-white dark:bg-slate-800 rounded-3xl btn-3d text-4xl font-black">]</button>
                                        </div>
                                    </div>
                                    <textarea ref={textareaRef} placeholder="Pega letra con [Acordes]..." className="w-full h-[700px] p-12 rounded-[80px] border-4 border-slate-300 font-mono text-2xl outline-none focus:ring-[30px] ring-indigo-500/5 dark:bg-slate-900 shadow-inner" value={editLyrics} onChange={e=>setEditLyrics(e.target.value)} />
                                    <button onClick={handleSave} className="w-full py-8 bg-indigo-600 text-white rounded-[40px] font-black btn-3d uppercase text-2xl shadow-2xl tracking-widest">GUARDAR</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* CONTROLES FLOTANTES */}
                    {currentView === 'view' && (
                        <div className="fixed bottom-8 right-8 flex flex-col items-end gap-4 z-[100] no-print">
                            <div className="flex items-center gap-2 p-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur rounded-full shadow-2xl border-4 border-slate-950">
                                <span className="font-black text-indigo-600 text-sm px-2">{bpm} <span className="text-[8px] opacity-40">BPM</span></span>
                                <button onClick={()=>setIsMetronomePlaying(!isMetronomePlaying)} className={`w-10 h-10 rounded-full flex items-center justify-center ${isMetronomePlaying?'bg-red-500':'bg-emerald-600'} text-white shadow-lg`}><Icon name={isMetronomePlaying ? "pause" : "music"} size={16}/></button>
                            </div>
                            <div className="flex items-center gap-3 p-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur rounded-full shadow-2xl border-4 border-slate-950">
                                {isScrolling && (
                                    <div className="flex items-center gap-2 pr-2 border-r border-slate-300">
                                        <button className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full" onClick={() => setScrollSpeed(s => Math.max(1, s-1))}><Icon name="rewind" size={18}/></button>
                                        <span className="font-black text-indigo-600 px-1 text-sm">{scrollSpeed}x</span>
                                        <button className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full" onClick={() => setScrollSpeed(s => Math.min(10, s+1))}><Icon name="fast-forward" size={18}/></button>
                                    </div>
                                )}
                                <button onClick={() => setIsScrolling(!isScrolling)} className={`p-6 rounded-full text-white shadow-xl transition-all ${isScrolling ? 'bg-red-500' : 'bg-indigo-600'}`}><Icon name={isScrolling ? "pause" : "play"} size={32} /></button>
                            </div>
                        </div>
                    )}

                    {/* MODAL AUTH DUAL */}
                    {showAuthModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[1000] text-center backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-md rounded-[56px] p-10 border-[12px] border-indigo-600/10 shadow-2xl relative animate-in">
                                <button onClick={()=>setShowAuthModal(false)} className="absolute top-8 right-8 opacity-30"><Icon name="x" size={32}/></button>
                                <h3 className="text-3xl font-black uppercase italic mb-8">MI CUENTA</h3>
                                
                                {authMode === 'login' ? (
                                    <div className="space-y-6">
                                        <button 
                                            onClick={() => fb.signInWithRedirect(fb.auth, fb.googleProvider)} 
                                            className="w-full py-6 bg-white dark:bg-slate-800 border-4 border-slate-950 rounded-3xl font-black text-sm flex items-center justify-center gap-4 shadow-xl active:translate-y-1 transition-all mb-4"
                                        >
                                            <img src="https://www.google.com/favicon.ico" className="w-8 h-8" /> ENTRAR CON GOOGLE
                                        </button>
                                        <div className="relative py-4"><div className="absolute inset-0 flex items-center"><div className="w-full border-t-4 border-slate-100 dark:border-slate-800"></div></div><div className="relative flex justify-center text-xs uppercase"><span className="bg-white dark:bg-slate-900 px-4 font-black opacity-30">O CON CORREO</span></div></div>
                                        <div className="space-y-4">
                                            <input type="email" placeholder="EMAIL" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none" value={email} onChange={e=>setEmail(e.target.value)} />
                                            <input type="password" placeholder="CONTRASEÑA" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none" value={pass} onChange={e=>setPass(e.target.value)} />
                                            <div className="flex gap-2">
                                                <button onClick={() => handleAuth('login')} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black btn-3d uppercase">ENTRAR</button>
                                                <button onClick={() => setAuthMode('register')} className="flex-1 py-4 bg-white border-4 border-slate-950 rounded-2xl font-black uppercase">CREAR</button>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <h4 className="font-black text-indigo-600">NUEVA CUENTA</h4>
                                        <input type="email" placeholder="TU MEJOR EMAIL" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none" value={email} onChange={e=>setEmail(e.target.value)} />
                                        <input type="password" placeholder="CREA UNA CLAVE" className="w-full p-4 rounded-2xl border-4 border-slate-950 dark:bg-slate-800 font-bold uppercase outline-none" value={pass} onChange={e=>setPass(e.target.value)} />
                                        <button onClick={() => handleAuth('register')} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black btn-3d uppercase">REGISTRARME</button>
                                        <button onClick={() => setAuthMode('login')} className="block w-full text-xs font-black uppercase opacity-60 pt-4 underline text-center">Ya tengo cuenta</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
