<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Corario App - Versión Maestra</title>
    
    <!-- Librerías de Producción -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono&family=Playfair+Display:wght@700&display=swap');
        
        :root { --indigo-primary: #4338ca; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            margin: 0; 
            min-height: 100vh;
        }

        .notranslate { translate: no !important; }

        /* --- BOTONES 3D --- */
        .btn-3d {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #1e1b4b; 
            border: 2px solid #1e1b4b;
            font-weight: 800;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e1b4b;
        }
        
        .btn-3d-secondary { box-shadow: 0 4px 0 #334155; border-color: #334155; }
        .btn-3d-amber { box-shadow: 0 4px 0 #78350f; border-color: #78350f; }

        /* --- RENDERIZADO DE ACORDES --- */
        .chord-line { display: flex; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.5rem; min-height: 3em; }
        .chord-seg { display: inline-flex; flex-direction: column; vertical-align: bottom; margin-right: 3px; }
        .chord-top { height: 1.4em; font-weight: 900; line-height: 1; white-space: nowrap; margin-bottom: 4px; user-select: none; font-family: 'JetBrains Mono', monospace; }
        .text-bottom { line-height: 1.3; white-space: pre; font-weight: 700; color: inherit; }

        /* MODO IMPRESORA */
        @media print {
            .print-hidden, header, .floating-tools, .modal-overlay, button, .tabs-nav, .search-bar, .tools-container { display: none !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            body { background: white !important; color: black !important; }
            .song-content { page-break-after: always; padding-top: 1cm; }
            .chord-top { color: #000 !important; }
        }

        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 10px; }

        /* Colores Dinámicos */
        body { background-color: #f8fafc; color: #020617; }
        .dark body { background-color: #020617 !important; color: #f8fafc !important; }
        
        /* Visibilidad del Título Crítica */
        .text-vibrant-day { color: #020617 !important; opacity: 1 !important; font-weight: 900 !important; }
        .dark .text-vibrant-day { color: #ffffff !important; }

        .song-card { background-color: #ffffff; border: 3px solid #000000; box-shadow: 0 6px 0 #000000; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .dark .song-card { background-color: #0f172a; border-color: #1e293b; box-shadow: 0 6px 0 #000000; }
        
        .dragging { opacity: 0.5 !important; transform: scale(0.95); border-style: dashed !important; }

        .font-modern { font-family: 'Inter', sans-serif; }
        .font-elegant { font-family: 'Playfair Display', serif; }
        .font-classic { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqMDVdI0mjTf9Mdvg1SmkPUZaaxV8X2o4",
            authDomain: "mi-corario-pro.firebaseapp.com",
            projectId: "mi-corario-pro",
            storageBucket: "mi-corario-pro.firebasestorage.app",
            messagingSenderId: "85524374170",
            appId: "1:85524374170:web:b4d509f79608a5145a3523",
            measurementId: "G-F8DYHNMLSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.FB = { auth, db, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, signInAnonymously, onAuthStateChanged, googleProvider, signInWithPopup, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
          const fb = window.FB;
          const [user, setUser] = useState(null);
          const [songs, setSongs] = useState([]);
          const [playlists, setPlaylists] = useState([]);
          const [loading, setLoading] = useState(true);
          
          const APP_ID = "corario-maestro-v1"; 

          const [currentView, setCurrentView] = useState('list'); 
          const [activeTab, setActiveTab] = useState('songs');
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          const [activeSongId, setActiveSongId] = useState(null);
          const [activePlaylistId, setActivePlaylistId] = useState(null);
          const [transposeSteps, setTransposeSteps] = useState(0);
          const [textSize, setTextSize] = useState(22);
          const [isScrolling, setIsScrolling] = useState(false);
          const [scrollSpeed, setScrollSpeed] = useState(2);
          const [bpm, setBpm] = useState(120);
          const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
          
          // Estilos Visuales
          const [showStylePanel, setShowStylePanel] = useState(false);
          const [fontStyle, setFontStyle] = useState('font-modern');
          const [lyricColor, setLyricColor] = useState('default');
          const [chordColor, setChordColor] = useState('default');

          const [editTitle, setEditTitle] = useState('');
          const [editArtist, setEditArtist] = useState('');
          const [editLyrics, setEditLyrics] = useState('');
          const [editKey, setEditKey] = useState('');

          const [searchQuery, setSearchQuery] = useState('');
          const [toast, setToast] = useState(null);
          const [itemToDelete, setItemToDelete] = useState(null);

          // Estados de Autenticación
          const [showAuthModal, setShowAuthModal] = useState(false);
          const [authMode, setAuthMode] = useState('login'); 
          const [email, setEmail] = useState('');
          const [pass, setPass] = useState('');

          const [showNewPlaylistModal, setShowNewPlaylistModal] = useState(false);
          const [newPlaylistName, setNewPlaylistName] = useState('');
          const [showAddSongModal, setShowAddSongModal] = useState(false);
          const [playlistMode, setPlaylistMode] = useState('list');

          // Estados de Arrastre
          const [draggedItemIndex, setDraggedItemIndex] = useState(null);
          const [isDragging, setIsDragging] = useState(false);

          const audioCtxRef = useRef(null);
          const textareaRef = useRef(null);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          useEffect(() => {
            const unsub = fb.onAuthStateChanged(fb.auth, (u) => {
              if (u) setUser(u);
              else fb.signInAnonymously(fb.auth);
              setLoading(false);
            });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!user) return;
            // Sincronización Nube - Tu progreso está a salvo con tu cuenta
            const unsubS = fb.onSnapshot(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs'), (snap) => {
              setSongs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            const unsubP = fb.onSnapshot(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists'), (snap) => {
              setPlaylists(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            return () => { unsubS(); unsubP(); };
          }, [user]);

          useEffect(() => {
            let interval;
            if (isScrolling) {
                interval = setInterval(() => { window.scrollBy(0, scrollSpeed); }, 50);
            }
            return () => clearInterval(interval);
          }, [isScrolling, scrollSpeed]);

          useEffect(() => {
            let interval;
            if (isMetronomePlaying) {
                interval = setInterval(() => {
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtxRef.current.createOscillator();
                    const gain = audioCtxRef.current.createGain();
                    osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                    osc.frequency.value = 1200;
                    gain.gain.setValueAtTime(0.15, audioCtxRef.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                }, 60000 / bpm);
            }
            return () => clearInterval(interval);
          }, [isMetronomePlaying, bpm]);

          const lyricStyleMap = { 
            'default': isDarkMode ? '#f8fafc' : '#020617', 
            'blue': '#2563eb', 'emerald': '#059669', 'rose': '#e11d48', 'amber': '#d97706' 
          };
          const chordStyleMap = { 
            'default': '#4338ca', 'red': '#dc2626', 'teal': '#0d9488', 'violet': '#7c3aed', 'orange': '#ea580c' 
          };

          const transposeChord = (chordStr, steps) => {
            if (!chordStr || steps === 0) return chordStr;
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const mapEs = { 'DO':'C', 'RE':'D', 'MI':'E', 'FA':'F', 'SOL':'G', 'LA':'A', 'SI':'B' };
            return chordStr.replace(/([A-G]|Do|Re|Mi|Fa|Sol|La|Si)[#b]?/gi, (m) => {
                let n = m.toUpperCase();
                if (mapEs[n]) n = mapEs[n];
                let idx = notes.indexOf(n.replace('B', '#'));
                if (idx === -1) idx = notes.indexOf(n);
                if (idx === -1) return m;
                let newIdx = (idx + steps) % 12;
                if (newIdx < 0) newIdx += 12;
                return notes[newIdx];
            });
          };

          const renderLyrics = (text, steps = transposeSteps) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <div key={i} className="h-4"></div>;
                const parts = line.split(/(\[[^\]]+\])/g);
                let segments = [];
                let lastChord = "";
                parts.forEach(p => {
                    if (p.startsWith('[') && p.endsWith(']')) lastChord = p.slice(1, -1);
                    else { segments.push({ chord: lastChord, text: p }); lastChord = ""; }
                });
                if (lastChord) segments.push({ chord: lastChord, text: "" });
                return (
                    <div key={i} className={`chord-line notranslate ${fontStyle}`} translate="no">
                        {segments.map((seg, j) => (
                            <div key={j} className="chord-seg notranslate">
                                <span className="chord-top notranslate" style={{ fontSize: `${textSize*0.75}px`, color: chordStyleMap[chordColor] }}>
                                    {seg.chord ? transposeChord(seg.chord, steps) : '\u00A0'}
                                </span>
                                <span className="text-bottom notranslate text-vibrant-day" style={{ fontSize: `${textSize}px`, color: lyricStyleMap[lyricColor] }}>
                                    {seg.text || (seg.chord ? '\u00A0' : '')}
                                </span>
                            </div>
                        ))}
                    </div>
                );
            });
          };

          const handleSave = async () => {
            if (!editTitle.trim()) return showToast("Falta el título", "error");
            try {
                const data = { title: editTitle, artist: editArtist, lyrics: editLyrics, musicalKey: editKey, updatedAt: Date.now() };
                if (activeSongId) await fb.updateDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs', activeSongId), data);
                else await fb.addDoc(fb.collection(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs'), data);
                setCurrentView('list'); setEditTitle(''); setEditLyrics('');
                showToast("¡Alabanza guardada!");
            } catch (e) { showToast("Error al guardar", "error"); }
          };

          const confirmDelete = async () => {
              if(!itemToDelete) return;
              try {
                  if(itemToDelete.type === 'song') await fb.deleteDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'songs', itemToDelete.id));
                  else if(itemToDelete.type === 'playlist') await fb.deleteDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists', itemToDelete.id));
                  showToast("Eliminado"); setItemToDelete(null);
              } catch(e) { showToast("Error al borrar", "error"); }
          };

          const handleGoogleLogin = async () => {
              try {
                  await fb.signInWithPopup(fb.auth, fb.googleProvider);
                  setShowAuthModal(false);
                  showToast("¡Sesión con Google!");
              } catch (e) { showToast("Error al conectar con Google", "error"); }
          };

          // --- MOTOR DE AUTENTICACIÓN MEJORADO ---
          const handleAuth = async () => {
              const cleanEmail = email.trim().toLowerCase();
              if(!cleanEmail || pass.length < 6) return showToast("Email válido y clave min. 6 caracteres", "error");
              try {
                  if(authMode === 'register') {
                    await fb.createUserWithEmailAndPassword(fb.auth, cleanEmail, pass);
                    showToast("¡Cuenta creada!");
                  } else {
                    await fb.signInWithEmailAndPassword(fb.auth, cleanEmail, pass);
                    showToast("¡Bienvenido!");
                  }
                  setShowAuthModal(false);
              } catch(e) { 
                  let msg = "Error en credenciales";
                  if (e.code === 'auth/user-not-found') msg = "Usuario no registrado";
                  if (e.code === 'auth/wrong-password') msg = "Contraseña incorrecta";
                  if (e.code === 'auth/email-already-in-use') msg = "El email ya está en uso";
                  showToast(msg, "error"); 
              }
          };

          const updatePlaylistSongs = async (newSongs) => {
              if (!activePlaylistId) return;
              await fb.updateDoc(fb.doc(fb.db, 'artifacts', APP_ID, 'users', user.uid, 'playlists', activePlaylistId), { songs: newSongs });
          };

          const insertBracket = (side) => {
              if (!textareaRef.current) return;
              const start = textareaRef.current.selectionStart;
              const end = textareaRef.current.selectionEnd;
              const text = editLyrics;
              setEditLyrics(text.substring(0, start) + (side === 'left' ? '[' : ']') + text.substring(end));
              setTimeout(() => { textareaRef.current.focus(); textareaRef.current.setSelectionRange(start + 1, start + 1); }, 0);
          };

          const showToast = (message, type = "success") => { setToast({message, type}); setTimeout(() => setToast(null), 3000); };

          const activeSong = songs.find(s => s.id === activeSongId);
          const activePlaylist = playlists.find(p => p.id === activePlaylistId);

          const TransposeToolbar = ({ songKey }) => (
            <div className="flex items-center gap-2 p-2 bg-white dark:bg-slate-900 rounded-3xl border-2 border-slate-950 dark:border-slate-800 shadow-sm print-hidden max-w-fit mt-4">
                <button onClick={()=>setTransposeSteps(s=>s-1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">-</button>
                <div className="px-4 font-black text-indigo-600 uppercase text-sm min-w-[100px] text-center">
                    {transposeSteps === 0 ? (songKey || 'G') : transposeChord(songKey || 'G', transposeSteps)}
                </div>
                <button onClick={()=>setTransposeSteps(s=>s+1)} className="w-8 h-8 rounded-xl font-black bg-slate-50 dark:bg-slate-800 btn-3d btn-3d-secondary text-sm text-vibrant-day">+</button>
            </div>
          );

          if (loading) return <div className="h-screen flex items-center justify-center bg-indigo-700 text-white font-black italic uppercase tracking-widest text-center px-4 animate-pulse">PREPARANDO EL MINISTERIO...</div>;

          return (
            <div className="min-h-screen transition-all">
              {toast && <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] animate-bounce bg-indigo-600 text-white text-xs tracking-widest uppercase`}>{toast.message}</div>}

              {/* HEADER */}
              <header className="sticky top-0 z-50 bg-indigo-700 dark:bg-slate-900 text-white p-4 shadow-xl print-hidden flex justify-between items-center text-white">
                <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => {setCurrentView('list'); setIsScrolling(false);}}>
                    <Icon name="music" size={30} />
                    <h1 className="text-2xl font-black italic uppercase tracking-tighter hidden sm:block">Corario AI</h1>
                </div>
                <div className="flex items-center gap-3">
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-12 h-12 flex items-center justify-center bg-white/10 dark:bg-slate-800 rounded-2xl btn-3d btn-3d-secondary transition-transform active:scale-90">
                        <Icon name={isDarkMode ? "sun" : "moon"} size={22} className="text-white" />
                    </button>
                    {user && !user.isAnonymous ? (
                        <button onClick={() => fb.signOut(fb.auth)} className="w-12 h-12 rounded-2xl border-2 border-white/20 overflow-hidden bg-indigo-500 shadow-md">
                            <img src={user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${user.email}`} className="w-full h-full object-cover" />
                        </button>
                    ) : (
                        <button onClick={() => setShowAuthModal(true)} className="btn-3d bg-white text-indigo-700 px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-widest">ENTRAR</button>
                    )}
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 md:p-10">
                {currentView === 'list' && (
                    <div className="animate-in text-center">
                        <div className="flex gap-4 mb-10 tabs-nav">
                            <button onClick={() => setActiveTab('songs')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'songs' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>ALABANZAS</button>
                            <button onClick={() => setActiveTab('playlists')} className={`flex-1 py-5 rounded-[28px] font-black btn-3d transition-all tracking-widest ${activeTab === 'playlists' ? 'bg-indigo-600 text-white shadow-xl' : 'bg-white dark:bg-slate-800 dark:text-white border-2 border-slate-950 text-slate-950'}`}>CULTOS</button>
                        </div>

                        {activeTab === 'songs' ? (
                            <>
                                <div className="flex gap-4 mb-10 search-bar text-left">
                                    <div className="relative flex-1">
                                        <Icon name="search" className="absolute left-4 top-3.5 opacity-60 text-slate-950 dark:text-white" />
                                        <input type="text" placeholder="Buscar título o artista..." className="w-full pl-12 pr-8 py-3.5 rounded-2xl bg-white dark:bg-slate-900 border-4 border-slate-950 focus:border-indigo-600 font-black text-slate-950 dark:text-white text-xl shadow-sm" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                    </div>
                                    <button onClick={() => { setActiveSongId(null); setEditTitle(''); setEditLyrics(''); setEditArtist(''); setEditKey(''); setCurrentView('edit'); }} className="btn-3d bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl shadow-2xl text-white text-white text-white"><Icon name="plus" size={28} /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {songs.filter(s => (s.title || '').toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                        <div key={s.id} onClick={() => {setActiveSongId(s.id); setTransposeSteps(0); setCurrentView('view');}} className="p-5 song-card rounded-[32px] cursor-pointer flex justify-between items-center group transition-all hover:scale-[1.02] text-left relative">
                                            <div className="overflow-hidden pr-4 flex-1 text-left">
                                                <h3 className="font-black text-xl uppercase truncate text-vibrant-day">{s.title}</h3>
                                                <p className="text-xs font-bold mt-1 opacity-60 uppercase tracking-[0.1em] text-slate-500 dark:text-indigo-300">[{s.musicalKey || 'G'}] • {s.artist || 'ANÓNIMO'}</p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); setItemToDelete({type:'song', id: s.id}); }} className="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <button onClick={() => setShowNewPlaylistModal(true)} className="p-16 border-4 border-dashed border-slate-950 rounded-[56px] text-slate-950 dark:text-slate-400 font-black flex flex-col items-center gap-6 hover:bg-white dark:hover:bg-slate-900 transition-all shadow-inner text-slate-950">
                                    <Icon name="folder-plus" size={56} /> <span className="tracking-[0.3em] uppercase">NUEVO CULTO</span>
                                </button>
                                {playlists.map(p => (
                                    <div key={p.id} onClick={() => {setActivePlaylistId(p.id); setPlaylistMode('list'); setCurrentView('playlistView');}} className="p-12 song-card rounded-[64px] hover:border-indigo-500 cursor-pointer shadow-2xl relative transition-all hover:scale-[1.02] text-left">
                                        <h3 className="text-4xl font-black uppercase italic text-vibrant-day pr-10 leading-tight">{p.name}</h3>
                                        <div className="flex items-center gap-2 text-indigo-600 mt-4 text-left">
                                            <Icon name="list-music" size={20}/>
                                            <p className="text-sm font-black uppercase tracking-widest text-indigo-600">{(p.songs || []).length} CANCIONES</p>
                                        </div>
                                        <button onClick={(e) => {e.stopPropagation(); setItemToDelete({type:'playlist', id: p.id}); }} className="absolute top-10 right-10 text-red-500 p-3 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-2xl shadow-sm"><Icon name="trash-2" size={24}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}

                {/* VISTA LECTURA CANCIÓN INDIVIDUAL */}
                {currentView === 'view' && activeSong && (
                    <div className="animate-in pb-40 song-content text-left">
                        <div className="flex justify-between items-center mb-12 print-hidden">

                        }} className={`w-full p-5 rounded-3xl border-2 text-left flex justify-between items-center transition-all ${(activePlaylist.songs || []).includes(s.id) ? 'bg-green-50 border-green-200 dark:bg-green-900/20' : 'hover:bg-indigo-50 border-transparent dark:border-slate-800 shadow-sm'}`}>
                          <div className="overflow-hidden pr-2 text-left">
                            <p className="font-bold truncate dark:text-white text-slate-950 uppercase">{s.title}</p>
                            <p className="text-xs opacity-50 font-mono tracking-widest text-vibrant-day">{s.artist}</p>
                          </div>
                          {(activePlaylist.songs || []).includes(s.id) ? <Icon name="check" className="text-green-600" /> : <Icon name="plus" className="text-indigo-600" />}
                        </button>
                      ))}
                    </div>
                    <button onClick={()=>setShowAddSongModal(false)} className="w-full mt-6 py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg text-center uppercase tracking-widest text-white text-white text-white">TERMINAR</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
